function loadSaveData() {
    try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (raw) {
            const data = JSON.parse(raw);
            // Merge with defaults to handle new fields
            return deepMerge(structuredClone(DEFAULT_SAVE), data);
        }
    } catch (e) {
        console.warn('Failed to load save data:', e);
    }
    return structuredClone(DEFAULT_SAVE);
}

function saveSaveData(data) {
    try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (e) {
        console.warn('Failed to save data:', e);
    }
}

function deepMerge(target, source) {
    for (const key of Object.keys(source)) {
        if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key])) {
            if (!target[key]) target[key] = {};
            deepMerge(target[key], source[key]);
        } else {
            target[key] = source[key];
        }
    }
    return target;
}

// Calculate essence earned from a completed game
function calculateEssence(wavesCompleted, bossesKilled, won, challengeMult = 1.0) {
    let essence = wavesCompleted * 10 + bossesKilled * 100;
    if (won) essence += 500;
    return Math.floor(essence * challengeMult);
}

function scaleEnemyHP(baseHP, wave) {
    return baseHP * (1.0 + (wave - 1) * 0.18);
}

function scaleEnemySpeed(baseSpeed, wave) {
    return baseSpeed * Math.min(1.0 + (wave - 1) * 0.025, 1.5);
}

function scaleEnemyReward(baseReward, wave) {
    return Math.floor(baseReward * (1.0 + (wave - 1) * 0.06));
}

// === pathfinding.js ===
// pathfinding.js — BFS pathfinding for enemy routes


// BFS from a spawn to nearest exit, returns array of {x, y} waypoints
function findRoute(tiles, spawn, exits) {
    const height = tiles.length;
    const width = tiles[0].length;
    const visited = Array.from({ length: height }, () => new Array(width).fill(false));
    const parent = Array.from({ length: height }, () => new Array(width).fill(null));

    const queue = [{ x: spawn[0], y: spawn[1] }];
    visited[spawn[1]][spawn[0]] = true;

    const exitSet = new Set(exits.map(e => `${e[0]},${e[1]}`));
    const dirs = [[1, 0], [-1, 0], [0, 1], [0, -1]];

    let found = null;
    while (queue.length > 0) {
        const cur = queue.shift();
        if (exitSet.has(`${cur.x},${cur.y}`)) {
            found = cur;
            break;
        }
        for (const [dx, dy] of dirs) {
            const nx = cur.x + dx;
            const ny = cur.y + dy;
            if (nx < 0 || nx >= width || ny < 0 || ny >= height) continue;
            if (visited[ny][nx]) continue;
            const tile = tiles[ny][nx];
            if (tile !== TileType.PATH && tile !== TileType.SPAWN && tile !== TileType.EXIT) continue;
            visited[ny][nx] = true;
            parent[ny][nx] = { x: cur.x, y: cur.y };
            queue.push({ x: nx, y: ny });
        }
    }

    if (!found) return [];

    // Reconstruct path
    const path = [];
    let cur = found;
    while (cur) {
        path.unshift({ x: cur.x, y: cur.y });
        cur = parent[cur.y][cur.x];
    }
    return path;
}

// Find all routes from each spawn to its nearest exit
function findAllRoutes(tiles, spawns, exits) {
    const routes = {};
    for (const spawn of spawns) {
        const key = `${spawn[0]},${spawn[1]}`;
        routes[key] = findRoute(tiles, spawn, exits);
    }
    return routes;
}

// Get flying path (straight line from spawn to nearest exit)
function getFlyingPath(spawn, exits) {
    let nearest = exits[0];
    let minDist = Infinity;
    for (const exit of exits) {
        const dx = exit[0] - spawn[0];
        const dy = exit[1] - spawn[1];
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < minDist) {
            minDist = dist;
            nearest = exit;
        }
    }
    return [
        { x: spawn[0], y: spawn[1] },
        { x: nearest[0], y: nearest[1] },
    ];
}


// === sprites.js ===
// sprites.js — Procedural sprite generation using offscreen canvas


const spriteCache = new Map();

function createCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    return c;
}

function getCached(key, w, h, drawFn) {
    if (spriteCache.has(key)) return spriteCache.get(key);
    const c = createCanvas(w, h);
    const ctx = c.getContext('2d');
    drawFn(ctx, w, h);
    spriteCache.set(key, c);
    return c;
}

// Tile sprites
function getGrassTile(variant = 0) {
    return getCached(`grass_${variant}`, TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = variant === 0 ? Colors.GRASS_DARK : Colors.GRASS_LIGHT;
        ctx.fillRect(0, 0, w, h);
        // Texture dots
        const rng = variant * 17 + 7;
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        for (let i = 0; i < 5; i++) {
            const x = ((rng * (i + 1) * 13) % w);
            const y = ((rng * (i + 1) * 7) % h);
            ctx.fillRect(x, y, 2, 2);
        }
    });
}

function getPathTile() {
    return getCached('path', TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.PATH;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.PATH_EDGE;
        ctx.fillRect(0, 0, w, 2);
        ctx.fillRect(0, h - 2, w, 2);
        // Gravel
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        for (let i = 0; i < 8; i++) {
            ctx.fillRect((i * 7 + 3) % w, (i * 11 + 5) % h, 2, 2);
        }
    });
}

function getWaterTile() {
    return getCached('water', TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.WATER;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.WATER_HIGHLIGHT;
        ctx.globalAlpha = 0.3;
        ctx.fillRect(4, 8, 12, 3);
        ctx.fillRect(18, 18, 10, 3);
        ctx.globalAlpha = 1;
    });
}

function getTreeTile(variant = 0) {
    return getCached(`tree_${variant}`, TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.GRASS_DARK;
        ctx.fillRect(0, 0, w, h);
        // Trunk
        ctx.fillStyle = Colors.TREE_TRUNK;
        ctx.fillRect(13, 18, 6, 14);
        // Canopy
        ctx.fillStyle = Colors.TREE_CANOPY;
        const sizes = [14, 16, 12];
        const s = sizes[variant % 3];
        ctx.beginPath();
        ctx.arc(16, 12, s / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.arc(18, 14, s / 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

function getRockTile(variant = 0) {
    return getCached(`rock_${variant}`, TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.GRASS_DARK;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.ROCK;
        const sizes = [[18, 14], [14, 16], [20, 12]];
        const [rw, rh] = sizes[variant % 3];
        ctx.beginPath();
        ctx.ellipse(16, 18, rw / 2, rh / 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = Colors.ROCK_DARK;
        ctx.beginPath();
        ctx.ellipse(18, 20, rw / 3, rh / 3, 0, 0, Math.PI * 2);
        ctx.fill();
    });
}

function getHighGroundTile() {
    return getCached('high_ground', TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.HIGH_GROUND;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.HIGH_GROUND_EDGE;
        ctx.fillRect(0, h - 4, w, 4);
        ctx.fillRect(0, 0, w, 2);
        // Platform highlight
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillRect(2, 2, w - 4, 4);
    });
}

function getSpawnTile() {
    return getCached('spawn', TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.PATH;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.SPAWN;
        ctx.globalAlpha = 0.4;
        ctx.fillRect(2, 2, w - 4, h - 4);
        ctx.globalAlpha = 1;
        // Arrow
        ctx.fillStyle = Colors.SPAWN;
        ctx.beginPath();
        ctx.moveTo(w / 2, 6);
        ctx.lineTo(w - 6, h / 2);
        ctx.lineTo(w / 2, h - 6);
        ctx.closePath();
        ctx.fill();
    });
}

function getExitTile() {
    return getCached('exit', TILE_SIZE, TILE_SIZE, (ctx, w, h) => {
        ctx.fillStyle = Colors.PATH;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = Colors.EXIT;
        ctx.globalAlpha = 0.4;
        ctx.fillRect(2, 2, w - 4, h - 4);
        ctx.globalAlpha = 1;
        ctx.fillStyle = Colors.EXIT;
        ctx.beginPath();
        ctx.moveTo(w / 2, 6);
        ctx.lineTo(w - 6, h / 2);
        ctx.lineTo(w / 2, h - 6);
        ctx.closePath();
        ctx.fill();
    });
}

function getTileSprite(tileType, x, y) {
    switch (tileType) {
        case TileType.GRASS: return getGrassTile((x + y) % 2);
        case TileType.PATH: return getPathTile();
        case TileType.WATER: return getWaterTile();
        case TileType.TREE: return getTreeTile((x * 3 + y * 7) % 3);
        case TileType.ROCK: return getRockTile((x * 5 + y * 3) % 3);
        case TileType.SPAWN: return getSpawnTile();
        case TileType.EXIT: return getExitTile();
        case TileType.TOWER_BASE: return getGrassTile(0);
        case TileType.HIGH_GROUND: return getHighGroundTile();
        default: return getGrassTile(0);
    }
}

// Tower sprites
function getTowerSprite(towerType, level = 1, size = TILE_SIZE) {
    const key = `tower_${towerType}_${level}_${size}`;
    return getCached(key, size, size, (ctx, w, h) => {
        const color = TowerColors[towerType] || '#888';
        const cx = w / 2, cy = h / 2;
        const r = w * 0.35;

        // Base platform
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.beginPath();
        ctx.ellipse(cx, cy + r * 0.5, r * 1.1, r * 0.4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Tower body
        ctx.fillStyle = color;
        switch (towerType) {
            case TowerType.ARROW:
                drawArrowTower(ctx, cx, cy, r, level);
                break;
            case TowerType.CANNON:
                drawCannonTower(ctx, cx, cy, r, level);
                break;
            case TowerType.MAGE:
                drawMageTower(ctx, cx, cy, r, level);
                break;
            case TowerType.ICE:
                drawIceTower(ctx, cx, cy, r, level);
                break;
            case TowerType.SKY_HUNTER:
                drawSkyHunterTower(ctx, cx, cy, r, level);
                break;
            case TowerType.FLAME:
                drawFlameTower(ctx, cx, cy, r, level);
                break;
            case TowerType.TESLA:
                drawTeslaTower(ctx, cx, cy, r, level);
                break;
            case TowerType.SNIPER:
                drawSniperTower(ctx, cx, cy, r, level);
                break;
            case TowerType.HARRY_DUCK:
                drawHarryDuckTower(ctx, cx, cy, r, level);
                break;
            case TowerType.AURA:
                drawAuraTower(ctx, cx, cy, r, level);
                break;
            case TowerType.GOLD_MINE:
                drawGoldMineTower(ctx, cx, cy, r, level);
                break;
            case TowerType.DOOM_SPIRE:
                drawDoomSpireTower(ctx, cx, cy, r, level);
                break;
            default:
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
        }

        // Level indicator (small dots)
        if (level > 1) {
            ctx.fillStyle = '#ffd700';
            const dotCount = Math.min(level - 1, 7);
            for (let i = 0; i < dotCount; i++) {
                const angle = (i / dotCount) * Math.PI * 2 - Math.PI / 2;
                const dx = cx + Math.cos(angle) * (r + 3);
                const dy = cy + Math.sin(angle) * (r + 3);
                ctx.beginPath();
                ctx.arc(dx, dy, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });
}

function drawArrowTower(ctx, cx, cy, r, level) {
    ctx.fillStyle = TowerColors[TowerType.ARROW];
    // Tower body
    ctx.fillRect(cx - r * 0.3, cy - r * 0.8, r * 0.6, r * 1.4);
    // Battlements
    ctx.fillRect(cx - r * 0.5, cy - r * 0.9, r * 0.25, r * 0.3);
    ctx.fillRect(cx + r * 0.25, cy - r * 0.9, r * 0.25, r * 0.3);
    // Bow
    ctx.strokeStyle = '#8B7355';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.2, r * 0.4, -0.8, 0.8);
    ctx.stroke();
}

function drawCannonTower(ctx, cx, cy, r, level) {
    ctx.fillStyle = TowerColors[TowerType.CANNON];
    // Base
    ctx.fillRect(cx - r * 0.6, cy - r * 0.3, r * 1.2, r * 0.9);
    // Barrel
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(cx - r * 0.15, cy - r * 0.9, r * 0.3, r * 0.7);
    // Wheel
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx - r * 0.3, cy + r * 0.3, r * 0.25, 0, Math.PI * 2);
    ctx.stroke();
}

function drawMageTower(ctx, cx, cy, r, level) {
    ctx.fillStyle = TowerColors[TowerType.MAGE];
    // Pointed tower
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r * 0.5, cy + r * 0.5);
    ctx.lineTo(cx - r * 0.5, cy + r * 0.5);
    ctx.closePath();
    ctx.fill();
    // Crystal
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.3, r * 0.2, 0, Math.PI * 2);
    ctx.fill();
}

function drawIceTower(ctx, cx, cy, r, level) {
    ctx.fillStyle = TowerColors[TowerType.ICE];
    // Crystal shape
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r * 0.6, cy);
    ctx.lineTo(cx, cy + r * 0.6);
    ctx.lineTo(cx - r * 0.6, cy);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.fillStyle = 'rgba(200, 240, 255, 0.4)';
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.3, 0, Math.PI * 2);
    ctx.fill();
}

function drawSkyHunterTower(ctx, cx, cy, r, level) {

// Enemy sprites
function getEnemySprite(enemyType, frame = 0, size = null) {
    const defaultSizes = {
        [EnemyType.IMP]: 16,
        [EnemyType.RUNNER]: 28,
        [EnemyType.WASP]: 24,
        [EnemyType.TANK]: 36,
        [EnemyType.SUMMONER]: 36,
        [EnemyType.BOSS]: 64,
    };
    const s = size || defaultSizes[enemyType] || 32;
    const key = `enemy_${enemyType}_${frame}_${s}`;
    return getCached(key, s, s, (ctx, w, h) => {
        const color = EnemyColors[enemyType] || '#888';
        const cx = w / 2, cy = h / 2;
        const r = w * 0.35;

        ctx.fillStyle = color;

        switch (enemyType) {
            case EnemyType.GRUNT:
                drawGruntEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.RUNNER:
                drawRunnerEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.TANK:
                drawTankEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.GHOST:
                drawGhostEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.HEALER:
                drawHealerEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.WASP:
                drawWaspEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.DISRUPTOR:
                drawDisruptorEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.SUMMONER:
                drawSummonerEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.IMP:
                drawImpEnemy(ctx, cx, cy, r, frame);
                break;
            case EnemyType.BOSS:
                drawBossEnemy(ctx, cx, cy, r, frame);
                break;
            default:
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fill();
        }
    });
}

function drawGruntEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.GRUNT];
    ctx.beginPath();
    ctx.arc(cx, cy + bob, r, 0, Math.PI * 2);
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - r * 0.3, cy - r * 0.2 + bob, 3, 3);
    ctx.fillRect(cx + r * 0.1, cy - r * 0.2 + bob, 3, 3);
}

function drawRunnerEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 3;
    ctx.fillStyle = EnemyColors[EnemyType.RUNNER];
    // Sleeker body
    ctx.beginPath();
    ctx.ellipse(cx, cy + bob, r, r * 0.7, 0, 0, Math.PI * 2);
    ctx.fill();
    // Speed lines
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - r * 1.2, cy + bob);
    ctx.lineTo(cx - r * 0.6, cy + bob);
    ctx.stroke();
}

function drawTankEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 1;
    ctx.fillStyle = EnemyColors[EnemyType.TANK];
    // Armored square body
    ctx.fillRect(cx - r, cy - r + bob, r * 2, r * 2);
    // Armor plates
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(cx - r + 2, cy - r + 2 + bob, r * 2 - 4, 3);
    ctx.fillRect(cx - r + 2, cy + r - 5 + bob, r * 2 - 4, 3);
}

function drawGhostEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.GHOST];
    ctx.globalAlpha = 0.7;
    // Ghostly shape
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.3 + bob, r, Math.PI, 0);
    ctx.lineTo(cx + r, cy + r + bob);
    for (let i = 0; i < 3; i++) {
        const x = cx + r - (i + 0.5) * (r * 2 / 3);
        ctx.quadraticCurveTo(x + r / 3, cy + r * 0.5 + bob, x, cy + r + bob);
    }
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 1;
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - r * 0.25, cy - r * 0.3 + bob, r * 0.15, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + r * 0.25, cy - r * 0.3 + bob, r * 0.15, 0, Math.PI * 2);
    ctx.fill();
}

function drawHealerEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.HEALER];
    ctx.beginPath();
    ctx.arc(cx, cy + bob, r, 0, Math.PI * 2);
    ctx.fill();
    // Cross
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 1.5, cy - r * 0.4 + bob, 3, r * 0.8);
    ctx.fillRect(cx - r * 0.4, cy - 1.5 + bob, r * 0.8, 3);
}

function drawWaspEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 2) * 3;
    ctx.fillStyle = EnemyColors[EnemyType.WASP];
    // Body
    ctx.beginPath();
    ctx.ellipse(cx, cy + bob, r, r * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Stripes
    ctx.fillStyle = '#333';
    ctx.fillRect(cx - r * 0.2, cy - r * 0.5 + bob, r * 0.4, 2);
    ctx.fillRect(cx - r * 0.2, cy + r * 0.2 + bob, r * 0.4, 2);
    // Wings
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    const wingFlap = Math.sin(frame * Math.PI) * 0.3;
    ctx.beginPath();
    ctx.ellipse(cx - r * 0.5, cy - r * 0.5 + bob, r * 0.5, r * 0.3, wingFlap, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + r * 0.5, cy - r * 0.5 + bob, r * 0.5, r * 0.3, -wingFlap, 0, Math.PI * 2);
    ctx.fill();
}

function drawDisruptorEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.DISRUPTOR];
    // Hexagonal shape
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
        const angle = (i / 6) * Math.PI * 2 - Math.PI / 2;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r + bob;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
    // Electric symbol
    ctx.strokeStyle = '#ff88ff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 2, cy - r * 0.4 + bob);
    ctx.lineTo(cx + 2, cy + bob);
    ctx.lineTo(cx - 2, cy + bob);
    ctx.lineTo(cx + 2, cy + r * 0.4 + bob);
    ctx.stroke();
}

function drawSummonerEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.SUMMONER];
    // Hooded figure
    ctx.beginPath();
    ctx.moveTo(cx, cy - r + bob);
    ctx.lineTo(cx + r * 0.7, cy + r * 0.5 + bob);
    ctx.lineTo(cx - r * 0.7, cy + r * 0.5 + bob);
    ctx.closePath();
    ctx.fill();
    // Hood
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(cx, cy - r * 0.3 + bob, r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    // Glowing orbs
    ctx.fillStyle = '#88ffcc';
    ctx.beginPath();
    ctx.arc(cx - r * 0.3, cy + r * 0.2 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + r * 0.3, cy + r * 0.2 + bob, 3, 0, Math.PI * 2);
    ctx.fill();
}

function drawImpEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 1;
    ctx.fillStyle = EnemyColors[EnemyType.IMP];
    ctx.beginPath();
    ctx.arc(cx, cy + bob, r, 0, Math.PI * 2);
    ctx.fill();
}

function drawBossEnemy(ctx, cx, cy, r, frame) {
    const bob = Math.sin(frame * Math.PI / 4) * 2;
    ctx.fillStyle = EnemyColors[EnemyType.BOSS];
    // Large armored body
    ctx.beginPath();
    ctx.arc(cx, cy + bob, r, 0, Math.PI * 2);
    ctx.fill();
    // Crown
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(cx - r * 0.5, cy - r * 0.7 + bob);
    ctx.lineTo(cx - r * 0.3, cy - r * 1.1 + bob);
    ctx.lineTo(cx, cy - r * 0.8 + bob);
    ctx.lineTo(cx + r * 0.3, cy - r * 1.1 + bob);
    ctx.lineTo(cx + r * 0.5, cy - r * 0.7 + bob);
    ctx.closePath();
    ctx.fill();
    // Eyes
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(cx - r * 0.2, cy - r * 0.1 + bob, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + r * 0.2, cy - r * 0.1 + bob, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    // Armor detail
    ctx.strokeStyle = 'rgba(255,215,0,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy + bob, r * 0.7, 0, Math.PI * 2);
    ctx.stroke();

// Duck soldier sprite
function getDuckSprite(frame = 0, size = 32) {
    const key = `duck_${frame}_${size}`;
    return getCached(key, size, size, (ctx, w, h) => {
        const cx = w / 2, cy = h / 2;
        const bob = Math.sin(frame * Math.PI / 2) * 2;
        // Body
        ctx.fillStyle = '#f0d23c';

        ctx.ellipse(cx, cy + bob, w * 0.3, w * 0.25, 0, 0, Math.PI * 2);

        // Head
        ctx.beginPath();
        ctx.arc(cx + w * 0.15, cy - w * 0.2 + bob, w * 0.15, 0, Math.PI * 2);

        ctx.beginPath();
        ctx.moveTo(cx + w * 0.3, cy - w * 0.2 + bob);
        ctx.lineTo(cx + w * 0.4, cy - w * 0.15 + bob);
        ctx.lineTo(cx + w * 0.3, cy - w * 0.1 + bob);
        ctx.closePath();

        // Eye

        ctx.beginPath();
        ctx.arc(cx + w * 0.2, cy - w * 0.25 + bob, 1.5, 0, Math.PI * 2);

        // Tiny sword

        ctx.moveTo(cx + w * 0.1, cy + bob);

        ctx.stroke();
    });
}

// enemy.js — Enemy class



let nextEnemyId = 0;

class Enemy {
    constructor(type, wave, route, spawnIndex = 0) {
        this.id = nextEnemyId++;
        this.type = type;
        const data = ENEMY_DATA[type];

        this.name = data.name;
        this.maxHP = scaleEnemyHP(data.hp, wave);
        this.hp = this.maxHP;
        this.displayHP = this.hp;
        this.speed = scaleEnemySpeed(data.speed, wave);
        this.baseSpeed = this.speed;
        this.armor = data.armor;
        this.reward = scaleEnemyReward(data.reward, wave);
        this.livesCost = data.lives_cost;
        this.isFlying = data.is_flying;
        this.ability = data.ability;
        this.size = data.size;
        this.spawnIndex = spawnIndex;

        // Ability data
        this.healAmount = data.heal_amount || 0;
        this.healRadius = data.heal_radius || 0;
        this.healCooldown = data.heal_cooldown || 0;
        this.healTimer = 0;
        this.disableRadius = data.disable_radius || 0;
        this.disableDuration = data.disable_duration || 0;
        this.disableCooldown = data.disable_cooldown || 0;
        this.disableTimer = 0;
        this.summonType = data.summon_type || null;
        this.summonCount = data.summon_count || 0;
        this.stunRadius = data.stun_radius || 0;
        this.stunDuration = data.stun_duration || 0;
        this.stunCooldown = data.stun_cooldown || 0;
        this.stunTimer = 0;

        // Movement
        this.route = route;
        this.routeIndex = 0;
        if (route.length > 0) {
            this.x = route[0].x;
            this.y = route[0].y;
        } else {
            this.x = 0;
            this.y = 0;
        }

        // Status effects
        this.slowStrength = 0;
        this.slowTimer = 0;
        this.burnDPS = 0;
        this.burnTimer = 0;
        this.stunned = false;
        this.stunnedTimer = 0;
        this.armorBroken = false;
        this.armorBreakTimer = 0;

        // Visual
        this.animFrame = 0;
        this.animTimer = 0;
        this.hitFlashTimer = 0;
        this.alive = true;
        this.reachedExit = false;
        this.progress = 0; // 0-1 along route
    }

    get pixelX() {
        return GRID_OFFSET_X + this.x * TILE_SIZE + TILE_SIZE / 2;
    }

    get pixelY() {
        return GRID_OFFSET_Y + this.y * TILE_SIZE + TILE_SIZE / 2;
    }

    get currentSpeed() {
        if (this.stunned) return 0;
        if (this.ability === 'debuff_immune') return this.baseSpeed;
        return this.baseSpeed * (1 - this.slowStrength);
    }

    update(dt) {
        if (!this.alive || this.reachedExit) return;

        // Animation
        this.animTimer += dt;
        if (this.animTimer >= 0.12) {
            this.animTimer -= 0.12;
            this.animFrame = (this.animFrame + 1) % 8;
        }

        // Hit flash
        if (this.hitFlashTimer > 0) this.hitFlashTimer -= dt;

        // Display HP lerp
        const hpDiff = this.hp - this.displayHP;
        this.displayHP += hpDiff * Math.min(1, dt * 8);

        // Status effects
        if (this.slowTimer > 0) {
            this.slowTimer -= dt;
            if (this.slowTimer <= 0) this.slowStrength = 0;
        }
        if (this.burnTimer > 0) {
            this.burnTimer -= dt;
            this.hp -= this.burnDPS * dt;
            if (this.hp <= 0) { this.alive = false; return; }
            if (this.burnTimer <= 0) this.burnDPS = 0;
        }
        if (this.stunnedTimer > 0) {
            this.stunnedTimer -= dt;
            if (this.stunnedTimer <= 0) this.stunned = false;
        }
        if (this.armorBreakTimer > 0) {
            this.armorBreakTimer -= dt;
            if (this.armorBreakTimer <= 0) this.armorBroken = false;
        }

        // Ability timers
        if (this.ability === 'heal_aura') this.healTimer += dt;
        if (this.ability === 'disable_tower') this.disableTimer += dt;
        if (this.ability === 'tower_stun') this.stunTimer += dt;

        // Movement
        this.move(dt);
    }

    move(dt) {
        if (this.route.length === 0 || this.routeIndex >= this.route.length - 1) {
            this.reachedExit = true;
            return;
        }

        const speed = this.currentSpeed;
        if (speed <= 0) return;

        let remaining = speed * dt;
        while (remaining > 0 && this.routeIndex < this.route.length - 1) {
            const target = this.route[this.routeIndex + 1];
            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist <= remaining) {
                this.x = target.x;
                this.y = target.y;
                remaining -= dist;
                this.routeIndex++;
            } else {
                this.x += (dx / dist) * remaining;
                this.y += (dy / dist) * remaining;
                remaining = 0;
            }
        }

        // Update progress
        if (this.route.length > 1) {
            this.progress = this.routeIndex / (this.route.length - 1);
        }

        if (this.routeIndex >= this.route.length - 1) {
            this.reachedExit = true;
        }
    }

    takeDamage(amount) {
        this.hp -= amount;
        this.hitFlashTimer = 0.1;
        if (this.hp <= 0) {
            this.hp = 0;
            this.alive = false;
        }
    }

    applySlow(strength, duration) {
        if (this.ability === 'debuff_immune') return;
        if (this.armor === ArmorType.ETHEREAL) return;
        if (strength > this.slowStrength || this.slowTimer <= 0) {
            this.slowStrength = strength;
        }
        this.slowTimer = Math.max(this.slowTimer, duration);
    }

    applyBurn(dps, duration) {
        if (dps > this.burnDPS) {
            this.burnDPS = dps;
        }
        this.burnTimer = Math.max(this.burnTimer, duration);
    }

    applyStun(duration) {
        this.stunned = true;
        this.stunnedTimer = Math.max(this.stunnedTimer, duration);
    }

    applyArmorBreak(duration) {
        if (this.ability === 'debuff_immune') return;
        if (this.armor === ArmorType.ETHEREAL) return;
        this.armorBroken = true;
        this.armorBreakTimer = Math.max(this.armorBreakTimer, duration);
    }

    distanceTo(other) {
        const dx = this.x - other.x;
        const dy = this.y - other.y;
        return Math.sqrt(dx * dx + dy * dy);
    }

    distanceToPoint(px, py) {
        const dx = this.x - px;
        const dy = this.y - py;
        return Math.sqrt(dx * dx + dy * dy);
    }
}

        this.tickInterval = data.tick_interval || 0;
        this.tickTimer = 0;

        // Special tower data

        this.slowStrength = data.slow_strength || 0;
        this.slowDuration = data.slow_duration || 0;
        this.burnDPS = data.burn_dps || 0;
        this.burnDuration = data.burn_duration || 0;

        // Combat state
        this.cooldownTimer = 0;
        this.target = null;
        this.rotation = 0;
        this.fireAnimTimer = 0;
        this.disabled = false;
        this.disabledTimer = 0;
        this.stunned = false;
        this.stunnedTimer = 0;

        // Synergy buffs (applied externally)
        this.synergyDamageBonus = 0;
        this.synergyRangeBonus = 0;
        this.synergyFireRateBonus = 1.0;
        this.auraDamageBonus = 0;
        this.auraFireRateBonus = 1.0;

    get pixelX() {
        return GRID_OFFSET_X + this.gridX * TILE_SIZE + TILE_SIZE / 2;
    }

    get pixelY() {
        return GRID_OFFSET_Y + this.gridY * TILE_SIZE + TILE_SIZE / 2;
    }

    get damage() {
        let mult = this.level <= 7 ? UPGRADE_MULTIPLIERS[this.level - 1].damage : UPGRADE_MULTIPLIERS[6].damage;
        let dmg = this.baseDamage * mult;
        dmg *= (1 + this.synergyDamageBonus + this.auraDamageBonus);

        if (this.specialization) {
            const spec = TOWER_DATA[this.type].specializations[this.specialization];
            if (spec.damage_mult) dmg *= spec.damage_mult;
        }
        return dmg;
    }

    get range() {
        let mult = this.level <= 7 ? UPGRADE_MULTIPLIERS[this.level - 1].range : UPGRADE_MULTIPLIERS[6].range;
        let r = this.baseRange * mult;
        r += this.synergyRangeBonus;
        if (this.isHighGround) r += HIGH_GROUND_RANGE_BONUS;
        if (this.specialization) {
            const spec = TOWER_DATA[this.type].specializations[this.specialization];
            if (spec.range_bonus) r += spec.range_bonus;
        }
        return r;
    }

    get fireRate() {
        let mult = this.level <= 7 ? UPGRADE_MULTIPLIERS[this.level - 1].fire_rate : UPGRADE_MULTIPLIERS[6].fire_rate;
        let rate = this.baseFireRate * mult;
        rate *= this.synergyFireRateBonus;
        rate *= this.auraFireRateBonus;
        if (this.specialization) {
            const spec = TOWER_DATA[this.type].specializations[this.specialization];
            if (spec.fire_rate) rate = spec.fire_rate;
        }
        return rate;
    }

    get upgradeCost() {
        const data = TOWER_DATA[this.type];
        if (this.level > 7) return null;
        return data.upgrade_costs[this.level - 1];
    }

    get canUpgrade() {
        return this.level < 8;
    }

    get needsSpecialization() {
        return this.level === 7; // Next upgrade (to 8) requires specialization
    }

    upgrade() {
        if (this.level >= 8) return false;
        const cost = this.upgradeCost;
        this.level++;
        this.totalInvestment += cost;
        return true;
    }

    specialize(choice) {
        if (this.specialization || this.level < 8) return;
        this.specialization = choice;

        // Apply specialization-specific changes
        const spec = TOWER_DATA[this.type].specializations[choice];

        if (this.type === TowerType.ICE) {
            if (spec.splash_radius) this.splashRadius = spec.splash_radius;
            if (spec.slow_strength) this.slowStrength = spec.slow_strength;
            if (spec.slow_duration) this.slowDuration = spec.slow_duration;
        }
        if (this.type === TowerType.TESLA) {
            if (spec.chain_count) this.chainCount = spec.chain_count;
        }
        if (this.type === TowerType.FLAME) {
            if (spec.splash_radius) this.splashRadius = spec.splash_radius;
            if (spec.burn_dps) this.burnDPS = spec.burn_dps;
            if (spec.burn_duration) this.burnDuration = spec.burn_duration;
            if (spec.burn_dps_mult) this.burnDPS *= spec.burn_dps_mult;
            if (spec.burn_duration_bonus) this.burnDuration += spec.burn_duration_bonus;
        }
        if (this.type === TowerType.CANNON && spec.splash_bonus) {
            this.splashRadius += spec.splash_bonus;
        }
        if (this.type === TowerType.GOLD_MINE && spec.gold_per_tick) {
            this.goldPerTick = spec.gold_per_tick;
        }
    }

    update(dt, enemies) {
        if (this.disabled || this.stunned) {
            if (this.disabledTimer > 0) {
                this.disabledTimer -= dt;
                if (this.disabledTimer <= 0) this.disabled = false;
            }
            if (this.stunnedTimer > 0) {
                this.stunnedTimer -= dt;
                if (this.stunnedTimer <= 0) this.stunned = false;
            }
            return null;
        }

        // Fire animation
        if (this.fireAnimTimer > 0) this.fireAnimTimer -= dt;

        // Economy ticking
        if (this.isEconomy) {
            this.tickTimer += dt;
            if (this.tickTimer >= this.tickInterval) {
                this.tickTimer -= this.tickInterval;
                return { type: 'gold', amount: this.goldPerTick };
            }
            return null;
        }

        // Spawner ticking — only when enemies are alive
        if (this.isSpawner) {
            const aliveEnemies = enemies.filter(e => e.alive && !e.reachedExit);
            if (aliveEnemies.length === 0) {
                this.spawnTimer = 0; // reset so ducks don't burst-spawn
                return null;
            }
            this.spawnTimer += dt;
            if (this.spawnTimer >= this.spawnInterval) {
                this.spawnTimer -= this.spawnInterval;
                return { type: 'spawn_duck' };
            }
            return null;
        }

        // Support tower doesn't attack
        if (this.isSupport) return null;

        // Combat
        this.cooldownTimer -= dt;
        if (this.cooldownTimer > 0) return null;

        // Find target
        this.target = this.findTarget(enemies);
        if (!this.target) return null;

        // Rotate toward target
        const dx = this.target.x - this.gridX;
        const dy = this.target.y - this.gridY;
        this.rotation = Math.atan2(dy, dx);

        // Fire
        this.cooldownTimer = this.fireRate;
        this.fireAnimTimer = 0.15;

        return { type: 'fire', target: this.target };
    }

    findTarget(enemies) {
        const inRange = enemies.filter(e => {
            if (!e.alive || e.reachedExit) return false;
            if (e.isFlying && !this.canHitAir) return false;
            if (!e.isFlying && !this.canHitGround) return false;
            if (this.targetMode === TargetMode.AIR_ONLY && !e.isFlying) return false;
            if (this.targetMode === TargetMode.GROUND_ONLY && e.isFlying) return false;
            return e.distanceToPoint(this.gridX, this.gridY) <= this.range;
        });

        if (inRange.length === 0) return null;

        switch (this.targetMode) {
            case TargetMode.FIRST:
            case TargetMode.AIR_ONLY:
                return inRange.reduce((a, b) => a.progress > b.progress ? a : b);
            case TargetMode.LAST:
                return inRange.reduce((a, b) => a.progress < b.progress ? a : b);
            case TargetMode.STRONGEST:
                return inRange.reduce((a, b) => a.hp > b.hp ? a : b);
            case TargetMode.WEAKEST:
                return inRange.reduce((a, b) => a.hp < b.hp ? a : b);
            default:
                return inRange[0];
        }
    }

    cycleTargetMode() {
        const modes = [
            TargetMode.FIRST, TargetMode.LAST,
            TargetMode.STRONGEST, TargetMode.WEAKEST,
        ];
        if (this.targetMode === TargetMode.AIR_ONLY) return; // Sky-Hunter locked
        const idx = modes.indexOf(this.targetMode);
        this.targetMode = modes[(idx + 1) % modes.length];
    }

    disable(duration) {
        this.disabled = true;
        this.disabledTimer = Math.max(this.disabledTimer, duration);
    }

    stun(duration) {
        this.stunned = true;
        this.stunnedTimer = Math.max(this.stunnedTimer, duration);
    }
}

let nextProjectileId = 0;

class Projectile {
    constructor(tower, target) {
        this.id = nextProjectileId++;
        this.towerType = tower.type;
        this.x = tower.gridX;
        this.y = tower.gridY;
        this.targetId = target.id;
        this.targetX = target.x;
        this.targetY = target.y;
        this.speed = tower.projectileSpeed;
        this.damage = tower.damage;
        this.damageType = tower.baseDamageType;
        this.splashRadius = tower.splashRadius;
        this.chainCount = tower.chainCount;
        this.slowStrength = tower.slowStrength;
        this.slowDuration = tower.slowDuration;
        this.burnDPS = tower.burnDPS;
        this.burnDuration = tower.burnDuration;
        this.alive = true;
        this.towerId = tower.id;

        // Specialization data
        this.armorBreak = 0;
        this.chainStun = 0;
        this.executeMult = 0;
        this.executeThreshold = 0;
        this.ignoreArmor = false;

        if (tower.specialization) {
            // Pull from tower data specializations
            const towerData = window.__TOWER_DATA?.[tower.type];
            if (towerData?.specializations?.[tower.specialization]) {
                const s = towerData.specializations[tower.specialization];
                this.armorBreak = s.armor_break || 0;
                this.chainStun = s.chain_stun || 0;
                this.executeMult = s.execute_mult || 0;
                this.executeThreshold = s.execute_threshold || 0;
                this.ignoreArmor = s.ignore_armor || false;
            }
        }

        // Trail
        this.trail = [];
        this.trailTimer = 0;
    }

    get pixelX() {
        return GRID_OFFSET_X + this.x * TILE_SIZE + TILE_SIZE / 2;
    }

    get pixelY() {
        return GRID_OFFSET_Y + this.y * TILE_SIZE + TILE_SIZE / 2;
    }

    update(dt, enemies) {
        if (!this.alive) return;

        // Update trail
        this.trailTimer += dt;
        if (this.trailTimer >= 0.02) {
            this.trailTimer = 0;
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 8) this.trail.shift();
        }

        // Find target enemy
        const target = enemies.find(e => e.id === this.targetId && e.alive);
        if (target) {
            this.targetX = target.x;
            this.targetY = target.y;
        }

        // Move toward target
        const dx = this.targetX - this.x;
        const dy = this.targetY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 0.15 || this.speed === 0) {
            // Hit
            this.alive = false;
            return { hit: true, x: this.targetX, y: this.targetY };
        }

        const moveAmount = this.speed * dt;
        if (moveAmount >= dist) {
            this.x = this.targetX;
            this.y = this.targetY;
            this.alive = false;
            return { hit: true, x: this.targetX, y: this.targetY };
        }

        this.x += (dx / dist) * moveAmount;
        this.y += (dy / dist) * moveAmount;
        return null;
    }
}

class DuckSoldier {
    constructor(x, y, hp, damage, speed, isMega = false) {

        this.x = x;

        this.maxHP = hp;
        this.damage = damage;
        this.speed = speed;
        this.isMega = isMega;
        this.size = isMega ? 48 : 32;
        this.attackRange = 1.8;
        this.attackRate = 0.8;
        this.attackTimer = 0;
        this.lifetime = 20;
        this.lifeTimer = 0;
        this.target = null;
        this.alive = true;
        this.animFrame = 0;
        this.animTimer = 0;
    }

    get pixelX() {
        return GRID_OFFSET_X + this.x * TILE_SIZE + TILE_SIZE / 2;
    }

    get pixelY() {
        return GRID_OFFSET_Y + this.y * TILE_SIZE + TILE_SIZE / 2;
    }

    update(dt, enemies) {
        if (!this.alive) return null;

        this.lifeTimer += dt;
        if (this.lifeTimer >= this.lifetime) {
            this.alive = false;
            return null;
        }

        // Animation
        this.animTimer += dt;
        if (this.animTimer >= 0.2) {
            this.animTimer -= 0.2;
            this.animFrame = (this.animFrame + 1) % 4;
        }

        // Find nearest enemy
        let nearest = null;
        let nearestDist = Infinity;
        for (const e of enemies) {
            if (!e.alive || e.reachedExit || e.isFlying) continue;
            const dx = e.x - this.x;
            const dy = e.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < nearestDist) {
                nearestDist = dist;
                nearest = e;
            }
        }

        this.target = nearest;

        if (nearest && nearestDist <= this.attackRange) {
            // Attack
            this.attackTimer += dt;
            if (this.attackTimer >= this.attackRate) {
                this.attackTimer -= this.attackRate;
                return { type: 'attack', target: nearest, damage: this.damage };
            }
        } else if (nearest) {
            // Move toward nearest
            const dx = nearest.x - this.x;
            const dy = nearest.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            this.x += (dx / dist) * this.speed * dt;
            this.y += (dy / dist) * this.speed * dt;
        }

        return null;
    }

    takeDamage(amount) {
        this.hp -= amount;
        if (this.hp <= 0) {
            this.hp = 0;
            this.alive = false;
        }
    }
}


// === combat.js ===
// combat.js — Damage calculation and combat resolution



function calculateDamage(baseDamage, damageType, armorType, armorBroken, ignoreArmor) {
    if (ignoreArmor || !damageType) return baseDamage;
    let mult = ARMOR_MATRIX[armorType]?.[damageType] ?? 1.0;
    if (armorBroken) mult *= ARMOR_BREAK_MULTIPLIER;
    return baseDamage * mult;
}

function resolveProjectileHit(projectile, enemies, effects) {
    const { targetX: tx, targetY: ty } = projectile;

    // Find primary target (nearest to hit point)
    let primary = null;
    let minDist = Infinity;
    for (const e of enemies) {
        if (!e.alive || e.reachedExit) continue;
        const dx = e.x - tx;
        const dy = e.y - ty;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1.5 && dist < minDist) {
            minDist = dist;
            primary = e;
        }
    }

    if (!primary) return [];

    const kills = [];

    // Execute multiplier check
    let dmg = projectile.damage;
    if (projectile.executeMult > 0 && primary.hp / primary.maxHP < projectile.executeThreshold) {
        dmg *= projectile.executeMult;
    }

    // Calculate and apply damage
    const finalDmg = calculateDamage(dmg, projectile.damageType, primary.armor, primary.armorBroken, projectile.ignoreArmor);
    primary.takeDamage(finalDmg);

    // Effects
    effects.addFloatingText(primary.pixelX, primary.pixelY - 20, Math.round(finalDmg).toString(), '#ff4444');

    if (!primary.alive) kills.push(primary);

    // Slow
    if (projectile.slowStrength > 0) {
        primary.applySlow(projectile.slowStrength, projectile.slowDuration);
    }

    // Burn
    if (projectile.burnDPS > 0) {
        primary.applyBurn(projectile.burnDPS, projectile.burnDuration);
    }

    // Armor break
    if (projectile.armorBreak > 0) {
        primary.applyArmorBreak(projectile.armorBreak);
    }

    // Splash damage
    if (projectile.splashRadius > 0) {
        for (const e of enemies) {
            if (e === primary || !e.alive || e.reachedExit) continue;
            const dx = e.x - tx;
            const dy = e.y - ty;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist <= projectile.splashRadius) {
                const splashDmg = calculateDamage(
                    dmg * SPLASH_DAMAGE_RATIO, projectile.damageType,
                    e.armor, e.armorBroken, projectile.ignoreArmor
                );
                e.takeDamage(splashDmg);
                if (!e.alive) kills.push(e);
            }
        }
        // Splash visual
        effects.addExpandingRing(
            primary.pixelX, primary.pixelY,
            projectile.splashRadius * 32, '#ff6633'
        );
    }

    // Chain damage
    if (projectile.chainCount > 0) {
        let lastTarget = primary;
        const chained = new Set([primary.id]);

        for (let i = 0; i < projectile.chainCount; i++) {
            let nearest = null;
            let nearestDist = Infinity;
            for (const e of enemies) {
                if (!e.alive || e.reachedExit || chained.has(e.id)) continue;
                const dist = lastTarget.distanceTo(e);
                if (dist <= CHAIN_MAX_DISTANCE && dist < nearestDist) {
                    nearestDist = dist;
                    nearest = e;
                }
            }
            if (!nearest) break;

            chained.add(nearest.id);
            const chainDmg = calculateDamage(
                dmg * CHAIN_DAMAGE_RATIO, projectile.damageType,
                nearest.armor, nearest.armorBroken, projectile.ignoreArmor
            );
            nearest.takeDamage(chainDmg);
            if (!nearest.alive) kills.push(nearest);

            // Chain stun
            if (projectile.chainStun > 0) {
                nearest.applyStun(projectile.chainStun);
            }

            // Chain visual (lightning line)
            effects.addLightning(lastTarget.pixelX, lastTarget.pixelY, nearest.pixelX, nearest.pixelY);

            lastTarget = nearest;
        }
    }

    return kills;
}

function resolveAoePulse(tower, enemies, effects) {
    const kills = [];
    const range = tower.range;

    for (const e of enemies) {
        if (!e.alive || e.reachedExit) continue;
        if (e.isFlying && !tower.canHitAir) continue;
        if (!e.isFlying && !tower.canHitGround) continue;
        const dist = e.distanceToPoint(tower.gridX, tower.gridY);
        if (dist <= range) {
            const dmg = calculateDamage(tower.damage, tower.baseDamageType, e.armor, e.armorBroken, false);
            e.takeDamage(dmg);
            effects.addFloatingText(e.pixelX, e.pixelY - 20, Math.round(dmg).toString(), '#cc44ff');
            if (!e.alive) kills.push(e);

            // Vortex spec: pull and slow
            if (tower.specialization === 'B') {
                const spec = TOWER_DATA[tower.type]?.specializations?.B;
                if (spec?.vortex_pull) {
                    const dx = tower.gridX - e.x;
                    const dy = tower.gridY - e.y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d > 0) {
                        e.x += (dx / d) * Math.min(spec.vortex_pull, d);
                        e.y += (dy / d) * Math.min(spec.vortex_pull, d);
                    }
                    e.applySlow(spec.vortex_slow, spec.vortex_slow_duration);
                }
            }
        }
    }

    // Pulse visual
    effects.addExpandingRing(tower.pixelX, tower.pixelY, range * 32, '#9933ff');

    return kills;
}

    }

    registerKill(x, y) {
        if (this.comboTimer > 0) {
            this.comboCount++;
        } else {
            this.comboCount = 1;
        }
        this.comboTimer = this.comboWindow;
        this.lastKillX = x;
        this.lastKillY = y;

        if (this.comboCount >= 3) {
            let label, color;
            if (this.comboCount >= 8) { label = 'MEGA KILL!'; color = '#ff3300'; }
            else if (this.comboCount >= 5) { label = `x${this.comboCount} FRENZY!`; color = '#ff6633'; }
            else { label = `x${this.comboCount}!`; color = '#e6b800'; }
            this.addFloatingText(x, y - 30, label, color, 1.2);
            // Extra particles for big combos
            if (this.comboCount >= 5) {
                for (let i = 0; i < 6; i++) {
                    this.addParticle(x, y, color);
                }
            }
        }
        return this.comboCount >= 3 ? this.comboCount : 0;
    }

    addPortalParticles(x, y) {
        const colors = ['rgb(180,60,60)', 'rgb(120,40,40)', 'rgb(200,80,80)'];
        for (let i = 0; i < 5; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 15;
            this.particles.push({
                x: x + Math.cos(angle) * dist,
                y: y + Math.sin(angle) * dist,
                color: colors[Math.floor(Math.random() * 3)],
                vx: -Math.cos(angle) * 30,
                vy: -Math.sin(angle) * 30,
                life: 1.0, maxLife: 0.5,
                size: 2 + Math.random(), gravity: 0,
            });
        }
    }

    update(dt) {
        // Combo timer decay
        if (this.comboTimer > 0) {
            this.comboTimer -= dt;
            if (this.comboTimer <= 0) this.comboCount = 0;
        }

        // Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += p.gravity * dt;
            p.life -= dt / p.maxLife;
            if (p.life <= 0) this.particles.splice(i, 1);
        }

        // Floating texts
        for (let i = this.floatingTexts.length - 1; i >= 0; i--) {
            const t = this.floatingTexts[i];
            t.y += t.vy * dt;
            t.life -= dt;
            if (t.life <= 0) this.floatingTexts.splice(i, 1);
        }

        // Expanding rings
        for (let i = this.expandingRings.length - 1; i >= 0; i--) {
            const r = this.expandingRings[i];
            r.life -= dt;
            r.radius = r.maxRadius * (1 - r.life / r.maxLife);
            if (r.life <= 0) this.expandingRings.splice(i, 1);
        }

        // Lightning
        for (let i = this.lightnings.length - 1; i >= 0; i--) {
            this.lightnings[i].life -= dt;
            if (this.lightnings[i].life <= 0) this.lightnings.splice(i, 1);
        }

        // Announcements
        for (let i = this.announcements.length - 1; i >= 0; i--) {
            const a = this.announcements[i];
            a.life -= dt;
            a.scale = Math.min(1, a.scale + dt * 5);
            if (a.life <= 0) this.announcements.splice(i, 1);
        }

        // Screen shake
        if (this.screenShake > 0) {
            this.screenShake -= dt;
            if (this.screenShake <= 0) {
                this.shakeIntensity = 0;
            }
        }
    }

    draw(ctx) {
        const shakeX = this.screenShake > 0 ? (Math.random() - 0.5) * this.shakeIntensity * 2 : 0;
        const shakeY = this.screenShake > 0 ? (Math.random() - 0.5) * this.shakeIntensity * 2 : 0;

        ctx.save();
        ctx.translate(shakeX, shakeY);

        // Particles
        for (const p of this.particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;

        // Expanding rings
        for (const r of this.expandingRings) {
            ctx.globalAlpha = Math.max(0, r.life / r.maxLife) * 0.6;
            ctx.strokeStyle = r.color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Lightning
        for (const l of this.lightnings) {
            ctx.globalAlpha = l.life / l.maxLife;
            ctx.strokeStyle = '#88ddff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(l.x1, l.y1);
            // Jagged lightning
            const mx = (l.x1 + l.x2) / 2 + (Math.random() - 0.5) * 20;
            const my = (l.y1 + l.y2) / 2 + (Math.random() - 0.5) * 20;
            ctx.lineTo(mx, my);
            ctx.lineTo(l.x2, l.y2);
            ctx.stroke();
        }
        ctx.globalAlpha = 1;

        // Floating texts
        for (const t of this.floatingTexts) {
            const alpha = Math.max(0, t.life / t.maxLife);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = t.color;
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(t.text, t.x, t.y);
        }
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';

        ctx.restore();

        // Announcements (not affected by shake)
        for (const a of this.announcements) {
            const alpha = Math.min(1, a.life / a.maxLife * 2);
            ctx.globalAlpha = alpha;
            ctx.save();
            const sx = 460; // center of game area
            const sy = 350;
            ctx.translate(sx, sy);
            ctx.scale(a.scale, a.scale);
            ctx.fillStyle = a.color;
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(a.text, 0, 0);
            ctx.restore();
        }
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
    }
}

// renderer.js — All canvas rendering



class Renderer {
    constructor(ctx) {
        this.ctx = ctx;
        this.time = 0;
    }

    advance(dt) {
        this.time += dt;
    }

    clear() {
        this.ctx.fillStyle = Colors.BG;
        this.ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
    }

    drawMap(tiles) {
        for (let y = 0; y < GRID_HEIGHT; y++) {
            for (let x = 0; x < GRID_WIDTH; x++) {
                const tile = tiles[y][x];
                const sprite = getTileSprite(tile, x, y);
                const px = GRID_OFFSET_X + x * TILE_SIZE;
                const py = GRID_OFFSET_Y + y * TILE_SIZE;
                this.ctx.drawImage(sprite, px, py);

                // Water animation
                if (tile === TileType.WATER) {
                    const wave = Math.sin(this.time * 2.5 + x * 0.7 + y * 0.5);
                    this.ctx.fillStyle = `rgba(255,255,255,${0.1 + wave * 0.05})`;
                    this.ctx.fillRect(px + 4, py + 8 + wave * 2, 12, 2);
                }
            }
        }
    }

    drawTowers(towers) {
        const ctx = this.ctx;
        for (const tower of towers) {
            const px = GRID_OFFSET_X + tower.gridX * TILE_SIZE;
            const py = GRID_OFFSET_Y + tower.gridY * TILE_SIZE;

            // Draw tower base platform (high ground keeps its visual)
            if (tower.isHighGround) {
                const hgSprite = getTileSprite(8, tower.gridX, tower.gridY); // HIGH_GROUND = 8
                ctx.drawImage(hgSprite, px, py);
            }

            // Range circle for selected
            if (tower._selected) {
                ctx.fillStyle = 'rgba(255,255,255,0.05)';
                ctx.beginPath();
                ctx.arc(
                    px + TILE_SIZE / 2, py + TILE_SIZE / 2,
                    tower.range * TILE_SIZE, 0, Math.PI * 2
                );
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(
                    px + TILE_SIZE / 2, py + TILE_SIZE / 2,
                    tower.range * TILE_SIZE, 0, Math.PI * 2
                );
                ctx.stroke();
            }

            // [8] Aura tower range circle
            if (tower.isSupport) {
                ctx.fillStyle = 'rgba(230,200,60,0.08)';
                ctx.beginPath();
                ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, tower.range * TILE_SIZE, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(230,200,60,0.24)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // [2] Tower drop shadow
            ctx.fillStyle = 'rgba(0,0,0,0.25)';
            ctx.beginPath();
            ctx.ellipse(px + TILE_SIZE / 2, py + TILE_SIZE - 4, TILE_SIZE * 0.45, TILE_SIZE * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();

            // Tower sprite
            const sprite = getTowerSprite(tower.type, tower.level);
            const scale = tower.fireAnimTimer > 0 ? 1.1 : 1.0;

            // [1] Tower rotation toward target (only for attacking towers)
            if (tower.baseDamage > 0 && tower.rotation) {
                ctx.save();
                ctx.translate(px + TILE_SIZE / 2, py + TILE_SIZE / 2);
                ctx.rotate(tower.rotation);
                ctx.drawImage(sprite, -TILE_SIZE * scale / 2, -TILE_SIZE * scale / 2, TILE_SIZE * scale, TILE_SIZE * scale);
                ctx.restore();
            } else {
                const sx = (TILE_SIZE * (1 - scale)) / 2;
                const sy = (TILE_SIZE * (1 - scale)) / 2;
                ctx.drawImage(sprite, px + sx, py + sy, TILE_SIZE * scale, TILE_SIZE * scale);
            }

            // Disabled overlay
            if (tower.disabled || tower.stunned) {
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

                // [10] Stun stars as animated circles
                if (tower.stunned) {
                    for (let i = 0; i < 3; i++) {
                        const angle = this.time * 4 + i * 2.1;
                        const starX = px + TILE_SIZE / 2 + Math.cos(angle) * 8;
                        const starY = py + 4 + Math.sin(angle) * 5;
                        ctx.fillStyle = '#ffff00';
                        ctx.beginPath();
                        ctx.arc(starX, starY, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }
    }

    drawEnemies(enemies) {
        const ctx = this.ctx;
        for (const e of enemies) {
            if (!e.alive || e.reachedExit) continue;
            const sprite = getEnemySprite(e.type, e.animFrame, e.size);
            const px = e.pixelX - e.size / 2;
            const py = e.pixelY - e.size / 2;

            // [3] Enemy drop shadow
            const shadowY = e.isFlying ? e.pixelY + e.size / 2 + 6 : e.pixelY + e.size / 2 - 2;
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(e.pixelX, shadowY, e.size * 0.4, e.size * 0.15, 0, 0, Math.PI * 2);
            ctx.fill();

            // Hit flash
            if (e.hitFlashTimer > 0) {
                ctx.globalAlpha = 0.6;
                ctx.filter = 'brightness(2)';
            }

            ctx.drawImage(sprite, px, py);
            ctx.globalAlpha = 1;
            ctx.filter = 'none';

            // [4] Status effect tints on enemies
            if (e.slowStrength > 0 && e.slowTimer > 0) {
                ctx.fillStyle = 'rgba(102,204,255,0.24)';
                ctx.fillRect(px, py, e.size, e.size);
            }
            if (e.burnDPS > 0 && e.burnTimer > 0) {
                ctx.fillStyle = 'rgba(255,51,0,0.20)';
                ctx.fillRect(px, py, e.size, e.size);
            }
            if (e.armorBroken && e.armorBreakTimer > 0) {
                ctx.fillStyle = 'rgba(255,255,0,0.16)';
                ctx.fillRect(px, py, e.size, e.size);
            }

            // HP bar
            if (e.hp < e.maxHP) {
                const barW = e.size;
                const barH = 4;
                const barX = e.pixelX - barW / 2;
                const barY = e.pixelY - e.size / 2 - 8;
                const hpRatio = Math.max(0, e.hp / e.maxHP);

                // HP bar background
                ctx.fillStyle = Colors.HP_BG;
                ctx.fillRect(barX, barY, barW, barH);

                // [6] HP bar damage preview (displayHP)
                const displayRatio = Math.max(0, e.displayHP / e.maxHP);
                if (displayRatio > hpRatio) {
                    ctx.fillStyle = '#b42828';
                    ctx.fillRect(barX, barY, barW * displayRatio, barH);
                }

                // [5] HP bar gradient fill
                let barTop, barBot;
                if (hpRatio > 0.6) { barTop = '#28dc28'; barBot = '#14a014'; }
                else if (hpRatio > 0.3) { barTop = '#ffff3c'; barBot = '#c8b414'; }
                else { barTop = '#ff3c28'; barBot = '#b41e14'; }
                const gradient = ctx.createLinearGradient(barX, barY, barX, barY + barH);
                gradient.addColorStop(0, barTop);
                gradient.addColorStop(1, barBot);
                ctx.fillStyle = gradient;
                ctx.fillRect(barX, barY, barW * hpRatio, barH);

                // [7] Armor type indicator dot
                if (e.armor === 'plated') {
                    ctx.fillStyle = 'rgb(180,180,190)';
                    ctx.beginPath();
                    ctx.arc(barX + barW + 3, barY + barH / 2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.armor === 'ethereal') {
                    ctx.fillStyle = 'rgb(160,120,220)';
                    ctx.beginPath();
                    ctx.arc(barX + barW + 3, barY + barH / 2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.armor === 'resistant') {
                    ctx.fillStyle = 'rgb(180,150,80)';
                    ctx.beginPath();
                    ctx.arc(barX + barW + 3, barY + barH / 2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Status indicators
            let iconX = e.pixelX - e.size / 2;
            const iconY = e.pixelY + e.size / 2 + 2;
            if (e.slowStrength > 0 && e.slowTimer > 0) {
                ctx.fillStyle = Colors.FROST;
                ctx.font = '8px Arial';
                ctx.fillText('~', iconX, iconY + 8);
                iconX += 8;
            }
            if (e.burnDPS > 0 && e.burnTimer > 0) {
                ctx.fillStyle = Colors.FIRE;
                ctx.font = '8px Arial';
                ctx.fillText('^', iconX, iconY + 8);
            }
        }
    }

    drawProjectiles(projectiles) {
        for (const p of projectiles) {
            if (!p.alive) continue;

            // Trail
            if (p.trail.length > 1) {
                for (let i = 1; i < p.trail.length; i++) {
                    const alpha = i / p.trail.length * 0.5;
                    this.ctx.globalAlpha = alpha;
                    const pt = p.trail[i];
                    const ppx = GRID_OFFSET_X + pt.x * TILE_SIZE + TILE_SIZE / 2;
                    const ppy = GRID_OFFSET_Y + pt.y * TILE_SIZE + TILE_SIZE / 2;
                    this.ctx.fillStyle = TowerColors[p.towerType] || '#fff';
                    this.ctx.beginPath();
                    this.ctx.arc(ppx, ppy, 2, 0, Math.PI * 2);
                    this.ctx.fill();
                }
                this.ctx.globalAlpha = 1;
            }

            // Projectile
            this.ctx.fillStyle = TowerColors[p.towerType] || '#fff';
            this.ctx.beginPath();
            this.ctx.arc(p.pixelX, p.pixelY, 4, 0, Math.PI * 2);
            this.ctx.fill();

            // Glow
            this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
            this.ctx.beginPath();
            this.ctx.arc(p.pixelX, p.pixelY, 6, 0, Math.PI * 2);
            this.ctx.fill();
        }
    }

    drawDucks(ducks) {
        for (const d of ducks) {
            if (!d.alive) continue;
            const sprite = getDuckSprite(d.animFrame, d.size);
            this.ctx.drawImage(sprite, d.pixelX - d.size / 2, d.pixelY - d.size / 2);

            // HP bar
            if (d.hp < d.maxHP) {
                const barW = d.size * 0.8;
                const barH = 3;
                const barX = d.pixelX - barW / 2;
                const barY = d.pixelY - d.size / 2 - 6;
                const hpRatio = d.hp / d.maxHP;
                this.ctx.fillStyle = Colors.HP_BG;
                this.ctx.fillRect(barX, barY, barW, barH);
                this.ctx.fillStyle = Colors.HP_GREEN;
                this.ctx.fillRect(barX, barY, barW * hpRatio, barH);
            }
        }
    }

    drawGhostTower(type, gridX, gridY, canPlace, rangeTiles) {
        const px = GRID_OFFSET_X + gridX * TILE_SIZE;
        const py = GRID_OFFSET_Y + gridY * TILE_SIZE;
        const cx = px + TILE_SIZE / 2;
        const cy = py + TILE_SIZE / 2;
        const rangeR = rangeTiles * TILE_SIZE;

        // Range preview circle (filled translucent + brighter outline)
        if (rangeTiles > 0) {
            const fillColor = canPlace ? 'rgba(0,255,0,0.12)' : 'rgba(255,0,0,0.12)';
            const strokeColor = canPlace ? 'rgba(0,255,0,0.28)' : 'rgba(255,0,0,0.28)';
            this.ctx.fillStyle = fillColor;
            this.ctx.beginPath();
            this.ctx.arc(cx, cy, rangeR, 0, Math.PI * 2);
            this.ctx.fill();
            this.ctx.strokeStyle = strokeColor;
            this.ctx.lineWidth = 1;
            this.ctx.beginPath();
            this.ctx.arc(cx, cy, rangeR, 0, Math.PI * 2);
            this.ctx.stroke();
        }

        // Ghost tower sprite (semi-transparent with green/red tint)
        this.ctx.globalAlpha = 0.6;
        const sprite = getTowerSprite(type, 1);
        this.ctx.drawImage(sprite, px, py);
        this.ctx.globalAlpha = 1;

        // Green/red border on the tile
        this.ctx.strokeStyle = canPlace ? 'rgba(0,255,0,0.6)' : 'rgba(255,0,0,0.6)';
        this.ctx.lineWidth = 2;
        this.ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
    }

    // [11] Synergy lines with double-draw glow
    drawSynergyLines(synergies) {
        const ctx = this.ctx;
        for (const s of synergies) {
            // Outer glow
            ctx.strokeStyle = 'rgba(230,184,0,0.31)';
            ctx.lineWidth = 3;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
            ctx.stroke();
            // Inner bright
            ctx.strokeStyle = 'rgba(230,184,0,0.63)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(s.x1, s.y1);
            ctx.lineTo(s.x2, s.y2);
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    // [9] Day/night tint overlay
    drawDayNightTint(wave, totalWaves) {
        if (wave <= 0) return;
        const ctx = this.ctx;
        const t = (wave - 1) / Math.max(totalWaves - 1, 1);
        const cycle = t * 2 * Math.PI;
        const r = Math.sin(cycle + Math.PI) * 15;
        const g = Math.sin(cycle + Math.PI * 0.5) * 8;
        const b = Math.sin(cycle) * 25;
        if (r === 0 && g === 0 && b === 0) return;
        const rr = Math.max(0, r);
        const gg = Math.max(0, g);
        const bb = Math.max(0, b);
        const ra = Math.max(0, -r);
        const ga = Math.max(0, -g);
        const ba = Math.max(0, -b);
        // Warm tint
        if (rr + gg + bb > 0) {
            ctx.fillStyle = `rgba(${Math.floor(rr * 4)},${Math.floor(gg * 4)},${Math.floor(bb * 4)},0.08)`;
            ctx.fillRect(0, 50, 960, 640);
        }
        // Cool tint
        if (ra + ga + ba > 0) {
            ctx.fillStyle = `rgba(${Math.floor(ra * 2)},${Math.floor(ga * 2)},${Math.floor(ba * 6)},0.06)`;
            ctx.fillRect(0, 50, 960, 640);
        }
    }
}
