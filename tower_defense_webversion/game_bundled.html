const PANEL_X = SCREEN_WIDTH - PANEL_WIDTH;
const PANEL_Y = TOP_BAR_HEIGHT;
const PANEL_H = SCREEN_HEIGHT - TOP_BAR_HEIGHT - BOTTOM_BAR_HEIGHT;
const W = PANEL_WIDTH - 20;  // usable width in panel

// Helper: draw rounded rect
function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

class UI {
    constructor() {
        this.shopButtons = [];
        this._buildShopButtons();
        // Dynamic rects for tower info view
        this._upgradeBtn = null;
        this._sellBtn = null;
        this._targetBtn = null;
        this._specABtn = null;
        this._specBBtn = null;
        this._showingTowerInfo = false;
    }

    _buildShopButtons() {
        let y = PANEL_Y + 32;
        this.shopButtons = TOWER_ORDER.map((type) => {
            const btn = { type, x: PANEL_X + 8, y, w: PANEL_WIDTH - 16, h: 50 };
            y += 54;
            return btn;
        });
    }

    // ─── Hit Testing ─────────────────────────────

    getShopButtonAt(mx, my) {
        for (const btn of this.shopButtons) {
            if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h)
                return btn;
        }
        return null;
    }

    getBottomButtonAt(mx, my, gameState) {
        const barY = SCREEN_HEIGHT - BOTTOM_BAR_HEIGHT;
        // Start Wave: Rect(12, barY+8, 160, 34)
        if (mx >= 12 && mx <= 172 && my >= barY + 8 && my <= barY + 42)
            return (gameState === GameState.PREP) ? 'start_wave' : null;
        // 2x: Rect(182, barY+8, 52, 34)
        if (mx >= 182 && mx <= 234 && my >= barY + 8 && my <= barY + 42) return 'speed_2x';
        // 4x: Rect(240, barY+8, 52, 34)
        if (mx >= 240 && mx <= 292 && my >= barY + 8 && my <= barY + 42) return 'speed_4x';
        // Pause: Rect(PANEL_X-50, 8, 42, 34)  — it's in the TOP bar
        if (mx >= PANEL_X - 50 && mx <= PANEL_X - 8 && my >= 8 && my <= 42) return 'pause';
        return null;
    }

    getSelectedTowerButtonAt(mx, my, selectedTower) {
        if (!selectedTower || !this._showingTowerInfo) return null;
        if (this._upgradeBtn && mx >= this._upgradeBtn.x && mx <= this._upgradeBtn.x + this._upgradeBtn.w &&
            my >= this._upgradeBtn.y && my <= this._upgradeBtn.y + this._upgradeBtn.h) return 'upgrade';
        if (this._sellBtn && mx >= this._sellBtn.x && mx <= this._sellBtn.x + this._sellBtn.w &&
            my >= this._sellBtn.y && my <= this._sellBtn.y + this._sellBtn.h) return 'sell';
        if (this._targetBtn && mx >= this._targetBtn.x && mx <= this._targetBtn.x + this._targetBtn.w &&
            my >= this._targetBtn.y && my <= this._targetBtn.y + this._targetBtn.h) return 'target_mode';
        if (this._specABtn && mx >= this._specABtn.x && mx <= this._specABtn.x + this._specABtn.w &&
            my >= this._specABtn.y && my <= this._specABtn.y + this._specABtn.h) return 'spec_A';
        if (this._specBBtn && mx >= this._specBBtn.x && mx <= this._specBBtn.x + this._specBBtn.w &&
            my >= this._specBBtn.y && my <= this._specBBtn.y + this._specBBtn.h) return 'spec_B';
        // Click elsewhere in panel = deselect
        if (mx >= PANEL_X) return 'deselect';
        return null;
    }

    getMenuButtonAt(mx, my, gameState) {
        const cx = SCREEN_WIDTH / 2;
        if (gameState === GameState.MAIN_MENU) {
            const by = this._menuBtnStartY || 330;
            if (this._hitRect(mx, my, cx - 160, by, 320, 58)) return 'play';
            if (this._hitRect(mx, my, cx - 160, by + 68, 320, 58)) return 'workshop';
            if (this._hitRect(mx, my, cx - 160, by + 136, 320, 58)) return 'editor';
            return null;
        }
        if (gameState === GameState.MAP_SELECT) {
            for (let i = 0; i < 10; i++) { // support up to 10 maps (5 built-in + custom)
                if (this._hitRect(mx, my, cx - 200, 100 + i * 70, 400, 60)) return `map_${i}`;
            }
            if (this._hitRect(mx, my, 20, SCREEN_HEIGHT - 60, 120, 40)) return 'back';
            return null;
        }
        if (gameState === GameState.PAUSED) {
            if (this._hitRect(mx, my, cx - 140, 380, 280, 50)) return 'resume';
            if (this._hitRect(mx, my, cx - 140, 450, 280, 50)) return 'restart';
            if (this._hitRect(mx, my, cx - 140, 520, 280, 50)) return 'main_menu';
            return null;
        }
        if (gameState === GameState.WON || gameState === GameState.LOST) {
            if (this._hitRect(mx, my, cx - 140, 520, 280, 50)) return 'main_menu';
            return null;
        }
        return null;
    }

    _hitRect(mx, my, x, y, w, h) {
        return mx >= x && mx <= x + w && my >= y && my <= y + h;
    }

    // ─── Top Bar (HUD) ─────────────────────────────
    // Matches Python hud.py exactly: gradient bg, custom icons, monospace stat values

    drawHUD(ctx, gold, lives, wave, enemyCount, gameState, speedMult) {
        // Top bar gradient
        for (let row = 0; row < TOP_BAR_HEIGHT; row++) {
            const t = row / TOP_BAR_HEIGHT;
            const r = Math.floor(26 + 10 * (1 - t));
            const g = Math.floor(26 + 10 * (1 - t));
            const b = Math.floor(46 + 14 * (1 - t));
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, row, SCREEN_WIDTH, 1);
        }
        // Bottom accent lines
        ctx.fillStyle = 'rgb(50,50,80)';
        ctx.fillRect(0, TOP_BAR_HEIGHT - 1, SCREEN_WIDTH, 1);
        ctx.fillStyle = 'rgb(20,20,36)';
        ctx.fillRect(0, TOP_BAR_HEIGHT - 2, SCREEN_WIDTH, 1);

        const cy = 14;  // vertical center for stat line

        // ── Gold icon (yellow circle with $) ──
        ctx.fillStyle = '#ffd700';
        ctx.beginPath(); ctx.arc(18, cy + 11, 6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#c8aa00'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(18, cy + 11, 6, 0, Math.PI * 2); ctx.stroke();
        ctx.fillStyle = '#a08200'; ctx.font = '12px Arial';
        ctx.textAlign = 'center'; ctx.fillText('$', 18, cy + 15); ctx.textAlign = 'left';
        // Label + value
        ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
        ctx.fillText('GOLD', 28, cy + 6);
        ctx.fillStyle = Colors.GOLD; ctx.font = 'bold 22px monospace';
        ctx.fillText(String(Math.floor(gold)), 28 + ctx.measureText('GOLD').width + 6, cy + 18);

        // ── Lives icon (heart shape) ──
        const lx = 180;
        const hy = cy + 11;
        ctx.fillStyle = 'rgb(220,50,50)';
        ctx.beginPath(); ctx.arc(lx + 3, hy - 2, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(lx + 9, hy - 2, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(lx, hy - 1); ctx.lineTo(lx + 6, hy + 5); ctx.lineTo(lx + 12, hy - 1);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
        ctx.fillText('LIVES', lx + 16, cy + 6);
        const livesColor = lives > 10 ? Colors.HP_GREEN : lives > 5 ? Colors.HP_YELLOW : Colors.HP_RED;
        ctx.fillStyle = livesColor; ctx.font = 'bold 22px monospace';
        ctx.fillText(String(lives), lx + 16 + ctx.measureText('LIVES').width + 6, cy + 18);

        // ── Wave icon (blue flag) ──
        const wx = 340;
        const fy = cy + 11;
        ctx.strokeStyle = 'rgb(180,180,200)'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(wx + 4, fy - 7); ctx.lineTo(wx + 4, fy + 6); ctx.stroke();
        ctx.fillStyle = 'rgb(80,140,220)';
        ctx.beginPath();
        ctx.moveTo(wx + 5, fy - 7); ctx.lineTo(wx + 14, fy - 4); ctx.lineTo(wx + 5, fy - 1);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
        ctx.fillText('WAVE', wx + 18, cy + 6);
        ctx.fillStyle = Colors.TEXT; ctx.font = 'bold 22px monospace';
        ctx.fillText(`${wave}/${TOTAL_WAVES}`, wx + 18 + ctx.measureText('WAVE').width + 6, cy + 18);

        // ── Enemies icon (skull) ──
        const ex = 510;
        const sy = cy + 10;
        ctx.fillStyle = 'rgb(180,180,180)';
        ctx.beginPath(); ctx.arc(ex + 6, sy - 1, 5, 0, Math.PI * 2); ctx.fill();
        ctx.fillRect(ex + 3, sy + 2, 7, 4);
        ctx.fillStyle = Colors.BG;
        ctx.beginPath(); ctx.arc(ex + 4, sy - 1, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex + 8, sy - 1, 1.2, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
        ctx.fillText('ENEMIES', ex + 16, cy + 6);
        ctx.fillStyle = Colors.TEXT; ctx.font = 'bold 22px monospace';
        ctx.fillText(String(enemyCount), ex + 16 + ctx.measureText('ENEMIES').width + 6, cy + 18);

        // ── Speed indicator ──
        if (speedMult > 1) {
            ctx.fillStyle = Colors.ACCENT; ctx.font = 'bold 28px Arial';
            ctx.fillText(`${speedMult}x`, 660, cy + 18);
        }

        // ── Pause button (in top bar) ──
        const pauseRect = { x: PANEL_X - 50, y: 8, w: 42, h: 34 };
        this._drawRoundBtn(ctx, pauseRect, '| |', Colors.BG_LIGHT, Colors.TEXT, 6, 'bold 20px Arial');
    }

    // ─── Bottom Bar ─────────────────────────────

    drawBottomBar(ctx, gameState, speedMult, nextWaveInfo, curWaveInfo) {
        const barY = SCREEN_HEIGHT - BOTTOM_BAR_HEIGHT;

        // Gradient (opposite direction from top)
        for (let row = 0; row < BOTTOM_BAR_HEIGHT; row++) {
            const t = row / BOTTOM_BAR_HEIGHT;
            const r = Math.floor(26 + 10 * t);
            const g = Math.floor(26 + 10 * t);
            const b = Math.floor(46 + 14 * t);
            ctx.fillStyle = `rgb(${r},${g},${b})`;
            ctx.fillRect(0, barY + row, SCREEN_WIDTH, 1);
        }
        // Top accent lines
        ctx.fillStyle = 'rgb(50,50,80)'; ctx.fillRect(0, barY, SCREEN_WIDTH, 1);
        ctx.fillStyle = 'rgb(20,20,36)'; ctx.fillRect(0, barY + 1, SCREEN_WIDTH, 1);

        const btnY = barY + 8;
        const isPrep = gameState === GameState.PREP;

        // Start Wave button
        const startRect = { x: 12, y: btnY, w: 160, h: 34 };
        const startBg = isPrep ? Colors.ACCENT : Colors.BG_LIGHT;
        const startText = isPrep ? 'START WAVE' : 'Spawning...';
        const startColor = isPrep ? Colors.BLACK : Colors.TEXT_DIM;
        this._drawRoundBtn(ctx, startRect, startText, startBg, startColor, 6, '17px Arial');

        // 2x speed
        const is2x = Math.abs(speedMult - 2) < 0.1;
        this._drawRoundBtn(ctx, { x: 182, y: btnY, w: 52, h: 34 }, '2x',
            is2x ? Colors.ACCENT : Colors.BG_LIGHT, is2x ? Colors.BLACK : Colors.TEXT, 6, 'bold 20px Arial');

        // 4x speed
        const is4x = Math.abs(speedMult - 4) < 0.1;
        this._drawRoundBtn(ctx, { x: 240, y: btnY, w: 52, h: 34 }, '4x',
            is4x ? '#ff6633' : Colors.BG_LIGHT, is4x ? Colors.BLACK : Colors.TEXT, 6, 'bold 20px Arial');

        // Next wave preview (during PREP)
        if (nextWaveInfo && isPrep) {
            ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
            ctx.fillText('Next:', 310, barY + 20);
            let xOff = 310 + ctx.measureText('Next: ').width + 4;
            const enemyColors = {
                grunt: '#50b43c', runner: '#3c8cdc', tank: '#c83c3c', ghost: '#b4a0dc',
                healer: '#78c850', wasp: '#e6c832', disruptor: '#8c3cb4', summoner: '#3ca08c',
                imp: '#dc5050', boss: '#7828b4',
            };
            for (const etype of nextWaveInfo.enemyTypes) {
                ctx.fillStyle = enemyColors[etype] || '#888';
                ctx.beginPath();
                ctx.arc(xOff + 6, barY + 17, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#fff'; ctx.font = '9px Arial';
                const label = etype.charAt(0).toUpperCase();
                ctx.textAlign = 'center';
                ctx.fillText(label, xOff + 6, barY + 20);
                ctx.textAlign = 'left';
                xOff += 18;
            }
            ctx.fillStyle = Colors.TEXT_DIM; ctx.font = '14px Arial';
            ctx.fillText(`(${nextWaveInfo.totalEnemies} enemies)`, xOff + 4, barY + 20);
        }

        // Current wave info (right side, during COMBAT)
        if (curWaveInfo && gameState === GameState.COMBAT) {
            const infoText = `Wave ${curWaveInfo.wave}: ${curWaveInfo.totalEnemies} enemies`;
            ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
            ctx.textAlign = 'right';
            ctx.fillText(infoText, PANEL_X - 10, barY + 28);
            ctx.textAlign = 'left';
        }
    }

    // ─── Shop Panel ─────────────────────────────

    drawShopPanel(ctx, gold, selectedTower, selectedType) {
        // Panel bg
        ctx.fillStyle = Colors.PANEL;
        ctx.fillRect(PANEL_X, PANEL_Y, PANEL_WIDTH, PANEL_H);
        ctx.fillStyle = Colors.PANEL_BORDER;
        ctx.fillRect(PANEL_X, PANEL_Y, 1, PANEL_H);

        if (selectedTower) {
            this._showingTowerInfo = true;
            this._drawTowerInfo(ctx, selectedTower, gold);
            return;
        }

        this._showingTowerInfo = false;
        this._upgradeBtn = this._sellBtn = this._targetBtn = this._specABtn = this._specBBtn = null;

        // Title "TOWERS" centered
        ctx.fillStyle = Colors.ACCENT;
        ctx.font = 'bold 22px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('TOWERS', PANEL_X + PANEL_WIDTH / 2, PANEL_Y + 22);
        ctx.textAlign = 'left';

        // Tower buttons
        for (const btn of this.shopButtons) {
            const data = TOWER_DATA[btn.type];
            const canAfford = gold >= data.cost;
            const isSel = selectedType === btn.type;

            // Background color
            let bgColor, textColor, statColor;
            if (isSel) {
                bgColor = Colors.ACCENT; textColor = Colors.BLACK; statColor = 'rgb(50,50,30)';
            } else if (canAfford) {
                bgColor = Colors.BG_LIGHT; textColor = Colors.TEXT; statColor = Colors.TEXT_DIM;
            } else {
                bgColor = 'rgb(30,30,40)'; textColor = Colors.TEXT_DARK; statColor = 'rgb(80,80,80)';
            }

            // Draw button with border-radius 4
            roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
            ctx.fillStyle = bgColor; ctx.fill();
            ctx.strokeStyle = Colors.PANEL_BORDER; ctx.lineWidth = 1; ctx.stroke();

            // Tower icon (32x32) — use grayed out when can't afford
            const sprite = getTowerSprite(btn.type, 1, 32);
            if (!canAfford && !isSel) {
                ctx.globalAlpha = 0.4;
            }
            ctx.drawImage(sprite, btn.x + 4, btn.y + 9);
            ctx.globalAlpha = 1;

            // Name (17pt, top-left after icon)
            ctx.fillStyle = textColor; ctx.font = '17px Arial';
            ctx.fillText(data.name, btn.x + 38, btn.y + 16);

            // Cost (17pt, right-aligned)
            ctx.fillStyle = canAfford ? Colors.GOLD : Colors.TEXT_DARK;
            ctx.font = '17px Arial';
            const costStr = `${data.cost}g`;
            const costW = ctx.measureText(costStr).width;
            ctx.fillText(costStr, btn.x + btn.w - costW - 4, btn.y + 16);

            // Stats line 1 (14px, always shown)
            ctx.font = '14px Arial'; ctx.fillStyle = statColor;
            if (data.damage > 0) {
                // Attacking tower: Dmg/Rng/Spd
                ctx.fillText(`Dmg:${data.damage}  Rng:${data.range.toFixed(1)}  Spd:${data.fire_rate}s`, btn.x + 38, btn.y + 32);
                // Stats line 2: damage type + traits (only if affordable or selected)
                if (canAfford || isSel) {
                    ctx.fillStyle = statColor; ctx.font = '14px Arial';
                    const dtype = data.damage_type ? (data.damage_type.charAt(0).toUpperCase() + data.damage_type.slice(1)) : '';
                    const traits = [dtype];
                    if (data.splash_radius > 0) traits.push(`AoE:${data.splash_radius}`);
                    if (data.chain_count > 0) traits.push(`Chain:${data.chain_count}`);
                    if (data.burn_dps > 0) traits.push('Burn');
                    if (btn.type === TowerType.SKY_HUNTER) traits.push('Air only');
                    if (data.is_aoe_pulse) traits.push('Pulse AoE');
                    ctx.fillText(traits.join('  '), btn.x + 38, btn.y + 46);
                }
            } else if (btn.type === TowerType.AURA) {
                ctx.fillText('Buffs nearby towers', btn.x + 38, btn.y + 32);
                if (canAfford || isSel) {
                    ctx.fillText(`Range: ${data.range.toFixed(1)}`, btn.x + 38, btn.y + 46);
                }
            } else if (btn.type === TowerType.HARRY_DUCK) {
                const duckDmg = data.duck_damage || 15;
                const duckHP = data.duck_hp || 80;
                const interval = data.spawn_interval || 6;
                ctx.fillText(`Duck: ${duckDmg}dmg ${duckHP}hp`, btn.x + 38, btn.y + 32);
                if (canAfford || isSel) {
                    ctx.fillText(`Spawn every ${interval}s`, btn.x + 38, btn.y + 46);
                }
            } else if (btn.type === TowerType.GOLD_MINE) {
                const gpt = data.gold_per_tick || 3;
                const interval = data.tick_interval || 5;
                ctx.fillStyle = canAfford ? Colors.GOLD : 'rgb(80,80,60)';
                ctx.fillText(`${gpt}g every ${interval}s`, btn.x + 38, btn.y + 32);
                if (canAfford || isSel) {
                    ctx.fillStyle = statColor; ctx.font = '14px Arial';
                    ctx.fillText(`(${(gpt * 60 / interval).toFixed(0)}g/min)`, btn.x + 38, btn.y + 46);
                }
            }

            // Not enough gold warning (replaces stats line 2)
            if (!canAfford && !isSel) {
                const shortfall = data.cost - gold;
                ctx.fillStyle = 'rgb(160,80,80)'; ctx.font = '14px Arial';
                ctx.fillText(`Need ${shortfall}g more`, btn.x + 38, btn.y + 46);
            }
        }
    }

    // ─── Tower Info (selected placed tower) ─────

    _drawTowerInfo(ctx, tower, gold) {
        const x = PANEL_X + 10;
        let y = PANEL_Y + 8;
        const w = PANEL_WIDTH - 20;

        // Name — large accent
        ctx.fillStyle = Colors.ACCENT; ctx.font = 'bold 22px Arial';
        ctx.fillText(tower.name, x, y + 18);
        y += 26;

        // Level pips
        this._drawLevelPips(ctx, x, y, tower.level, 8);
        y += 12;

        // Level text
        ctx.fillStyle = Colors.TEXT_DIM; ctx.font = '17px Arial';
        ctx.fillText(`Level ${tower.level} / 8`, x, y + 14);
        y += 20;

        // Specialization name
        if (tower.specialization) {
            const spec = TOWER_DATA[tower.type].specializations[tower.specialization];
            ctx.fillStyle = Colors.ENERGY || '#9933ff'; ctx.font = '17px Arial';
            ctx.fillText(spec.name, x, y + 14);
            y += 18;
            ctx.fillStyle = Colors.TEXT_DARK; ctx.font = '14px Arial';
            ctx.fillText(spec.desc, x, y + 12);
            y += 16;
        }

        // Separator
        y += 4;
        ctx.fillStyle = Colors.PANEL_BORDER; ctx.fillRect(x, y, w, 1);
        y += 6;

        // Stats
        const lh = 20;
        ctx.font = '17px Arial';
        if (tower.baseDamage > 0) {
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.fillText(`Damage: ${tower.damage.toFixed(0)}`, x, y + 14); y += lh;
            ctx.fillText(`Range: ${tower.range.toFixed(1)}`, x, y + 14); y += lh;
            ctx.fillText(`Fire Rate: ${tower.fireRate.toFixed(2)}s`, x, y + 14); y += lh;
            if (tower.baseDamageType) {
                ctx.fillText(`Type: ${tower.baseDamageType}`, x, y + 14); y += lh;
            }
            if (tower.splashRadius > 0) {
                ctx.fillText(`Splash: ${tower.splashRadius.toFixed(1)}`, x, y + 14); y += lh;
            }
        } else if (tower.type === TowerType.HARRY_DUCK) {
            ctx.fillStyle = Colors.GOLD;
            ctx.fillText(`Duck HP: ${tower.duckHP}`, x, y + 14); y += lh;
            ctx.fillText(`Duck Dmg: ${tower.duckDamage}`, x, y + 14); y += lh;
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.fillText(`Spawn: ${tower.spawnInterval}s`, x, y + 14); y += lh;
        } else if (tower.type === TowerType.AURA) {
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.fillText(`Buff: ${tower.auraBuff}`, x, y + 14); y += lh;
            ctx.fillText(`Range: ${tower.range.toFixed(1)}`, x, y + 14); y += lh;
        } else if (tower.type === TowerType.GOLD_MINE) {
            ctx.fillStyle = Colors.GOLD;
            ctx.fillText(`Income: ${tower.goldPerTick}g / ${tower.tickInterval}s`, x, y + 14); y += lh;
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.fillText(`(${(tower.goldPerTick * 60 / tower.tickInterval).toFixed(0)}g/min)`, x, y + 14); y += lh;
        }

        if (tower.isHighGround) {
            ctx.fillStyle = 'rgb(180,150,60)'; ctx.font = '14px Arial';
            ctx.fillText('+1 range (high ground)', x, y + 12); y += 16;
        }
        y += 4;

        // Targeting mode button
        if (tower.baseDamage > 0) {
            const tgtH = 28;
            this._targetBtn = { x, y, w, h: tgtH };
            this._drawRoundBtn(ctx, this._targetBtn, `Target: ${tower.targetMode}`,
                Colors.BG_LIGHT, Colors.TEXT, 3, '17px Arial');
            y += tgtH + 6;
        } else {
            this._targetBtn = null;
            y += 4;
        }

        // Separator
        ctx.fillStyle = Colors.PANEL_BORDER; ctx.fillRect(x, y, w, 1); y += 6;

        // Upgrade section
        if (tower.canUpgrade) {
            const cost = tower.upgradeCost;
            const canAfford = gold >= cost;

            if (tower.needsSpecialization) {
                // Specialization choice at level 7→8
                ctx.fillStyle = '#9933ff'; ctx.font = '14px Arial';
                ctx.fillText('SPECIALIZE:', x, y + 12); y += 18;

                if (!canAfford) {
                    ctx.fillStyle = 'rgb(180,80,80)'; ctx.font = '14px Arial';
                    ctx.fillText(`Need ${cost - gold}g more`, x, y + 12); y += 16;
                }

                const data = TOWER_DATA[tower.type];
                for (const key of ['A', 'B']) {
                    const spec = data.specializations[key];
                    const btn = { x, y, w, h: 46 };
                    if (key === 'A') this._specABtn = btn; else this._specBBtn = btn;

                    const bg = canAfford ? Colors.BG_LIGHT : 'rgb(25,25,35)';
                    const borderC = canAfford ? '#9933ff' : 'rgb(60,50,50)';
                    roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
                    ctx.fillStyle = bg; ctx.fill();
                    ctx.strokeStyle = borderC; ctx.lineWidth = 1; ctx.stroke();

                    ctx.fillStyle = canAfford ? Colors.TEXT : Colors.TEXT_DARK;
                    ctx.font = '14px Arial';
                    ctx.fillText(`${key}: ${spec.name}`, x + 4, y + 16);
                    ctx.fillStyle = Colors.TEXT_DIM;
                    ctx.fillText(spec.desc, x + 4, y + 34);
                    ctx.fillStyle = canAfford ? Colors.GOLD : Colors.TEXT_DARK;
                    ctx.fillText(`${cost}g`, x + w - 36, y + 16);
                    y += 50;
                }
                this._upgradeBtn = null;
            } else {
                // Standard upgrade button
                this._specABtn = this._specBBtn = null;
                this._upgradeBtn = { x, y, w, h: 30 };
                const canAf = gold >= cost;
                const bg = canAf ? Colors.ACCENT : 'rgb(30,30,40)';
                const txtC = canAf ? Colors.BLACK : Colors.TEXT_DARK;
                const borderC = canAf ? Colors.ACCENT : 'rgb(80,60,60)';

                roundRect(ctx, x, y, w, 30, 4);
                ctx.fillStyle = bg; ctx.fill();
                ctx.strokeStyle = borderC; ctx.lineWidth = 1; ctx.stroke();

                ctx.fillStyle = txtC; ctx.font = '14px Arial';
                ctx.fillText(`Upgrade to Lv ${tower.level + 1}`, x + 6, y + 20);
                ctx.fillStyle = canAf ? Colors.GOLD : Colors.TEXT_DARK;
                const costStr = `${cost}g`;
                ctx.fillText(costStr, x + w - ctx.measureText(costStr).width - 6, y + 20);

                y += 34;
                if (!canAf) {
                    ctx.fillStyle = 'rgb(160,80,80)'; ctx.font = '14px Arial';
                    ctx.fillText(`Need ${cost - gold}g more`, x, y + 12); y += 18;
                }
                // Upgrade preview
                ctx.fillStyle = 'rgb(100,180,100)'; ctx.font = '14px Arial';
                if (tower.type === TowerType.GOLD_MINE) {
                    ctx.fillText('+income per level', x, y + 12); y += 18;
                } else if (tower.type === TowerType.HARRY_DUCK) {
                    ctx.fillText('+duck stats per level', x, y + 12); y += 18;
                } else if (tower.baseDamage > 0) {
                    ctx.fillText('+dmg, +range, faster', x, y + 12); y += 18;
                }
            }
        } else {
            this._upgradeBtn = this._specABtn = this._specBBtn = null;
            // MAX LEVEL badge
            roundRect(ctx, x, y, w, 22, 4);
            ctx.fillStyle = 'rgb(40,30,60)'; ctx.fill();

                ctx.fillStyle = tierColors[Math.min(tier, tierColors.length - 1)];
                ctx.fillRect(px, y, pipSize, pipSize);

    drawLoseScreen(ctx, wave, bossesKilled = 0, totalKills = 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.71)';
        ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);
        const cx = SCREEN_WIDTH / 2;

        ctx.fillStyle = Colors.DANGER; ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
        ctx.fillText('DEFEAT', cx, 240);

        ctx.fillStyle = Colors.TEXT; ctx.font = '17px Arial';
        ctx.fillText(`Waves Completed: ${wave}`, cx, 300);
        ctx.fillText(`Enemies Killed: ${totalKills}`, cx, 325);
        ctx.fillText(`Bosses Slain: ${bossesKilled}`, cx, 350);

        // Essence preview
        const ess = wave * 10 + bossesKilled * 100;
        ctx.fillStyle = '#9933ff'; ctx.font = 'bold 22px Arial';
        ctx.fillText(`Essence Earned: +${ess}`, cx, 400);

        this._drawMenuButton(ctx, { x: cx - 140, y: 520, w: 280, h: 50 }, 'Continue', Colors.ACCENT, Colors.BLACK);
        ctx.textAlign = 'left';
    }

    // ─── Shared Button Drawing ─────────────────────────────

    _drawMenuButton(ctx, rect, text, bgColor, textColor) {
        const { x, y, w, h } = rect;
        // Shadow
        roundRect(ctx, x + 2, y + 2, w, h, 10);
        ctx.fillStyle = 'rgb(15,15,25)'; ctx.fill();
        // Body
        roundRect(ctx, x, y, w, h, 10);
        ctx.fillStyle = bgColor; ctx.fill();
        // Highlight (top third)
        ctx.save();
        roundRect(ctx, x + 2, y + 2, w - 4, Math.floor(h / 3), 8);
        ctx.clip();
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(x, y, w, h);
        ctx.restore();
        // Border
        roundRect(ctx, x, y, w, h, 10);
        ctx.strokeStyle = Colors.PANEL_BORDER; ctx.lineWidth = 1; ctx.stroke();
        // Text
        ctx.fillStyle = textColor; ctx.font = '22px Arial'; ctx.textAlign = 'center';
        ctx.fillText(text, x + w / 2, y + h / 2 + 7);
        ctx.textAlign = 'left';
    }

    _drawRoundBtn(ctx, rect, text, bgColor, textColor, radius = 6, font = '17px Arial') {
        const { x, y, w, h } = rect;
        roundRect(ctx, x, y, w, h, radius);
        ctx.fillStyle = bgColor; ctx.fill();
        ctx.strokeStyle = Colors.PANEL_BORDER; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = textColor; ctx.font = font; ctx.textAlign = 'center';
        ctx.fillText(text, x + w / 2, y + h / 2 + 5);
        ctx.textAlign = 'left';
    }

    getDamageTypeColor(type) {
        return { kinetic: Colors.KINETIC, explosive: Colors.EXPLOSIVE, energy: Colors.ENERGY,
                 frost: Colors.FROST, fire: Colors.FIRE }[type] || '#888';
    }
}


// === input.js ===
// input.js — Mouse and keyboard input handling


class InputManager {
    constructor(canvas) {
        this.canvas = canvas;
        this.mouseX = 0;
        this.mouseY = 0;
        this.gridX = -1;
        this.gridY = -1;
        this.isOnGrid = false;

        this.leftClick = false;
        this.rightClick = false;
        this.keysPressed = new Set();
        this.keysJustPressed = new Set();

        this.canvas.addEventListener('mousemove', e => this.onMouseMove(e));
        this.canvas.addEventListener('mousedown', e => this.onMouseDown(e));
        this.canvas.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('keydown', e => this.onKeyDown(e));
        window.addEventListener('keyup', e => this.onKeyUp(e));
    }

    onMouseMove(e) {
        const rect = this.canvas.getBoundingClientRect();
        const scaleX = this.canvas.width / rect.width;
        const scaleY = this.canvas.height / rect.height;
        this.mouseX = (e.clientX - rect.left) * scaleX;
        this.mouseY = (e.clientY - rect.top) * scaleY;

        this.gridX = Math.floor((this.mouseX - GRID_OFFSET_X) / TILE_SIZE);
        this.gridY = Math.floor((this.mouseY - GRID_OFFSET_Y) / TILE_SIZE);
        this.isOnGrid = this.gridX >= 0 && this.gridX < GRID_WIDTH &&
                        this.gridY >= 0 && this.gridY < GRID_HEIGHT &&
                        this.mouseX < SCREEN_WIDTH - PANEL_WIDTH;
    }

    onMouseDown(e) {
        this.onMouseMove(e); // Update position
        if (e.button === 0) this.leftClick = true;
        if (e.button === 2) this.rightClick = true;
    }

    onKeyDown(e) {
        this.keysPressed.add(e.key.toLowerCase());
        this.keysJustPressed.add(e.key.toLowerCase());
    }

    onKeyUp(e) {
        this.keysPressed.delete(e.key.toLowerCase());
    }

    consumeClick() {
        const had = this.leftClick;
        this.leftClick = false;
        return had;
    }

    consumeRightClick() {
        const had = this.rightClick;
        this.rightClick = false;
        return had;
    }

    consumeKey(key) {
        const had = this.keysJustPressed.has(key.toLowerCase());
        this.keysJustPressed.delete(key.toLowerCase());
        return had;
    }

    clearFrame() {
        this.leftClick = false;
        this.rightClick = false;
        this.keysJustPressed.clear();
    }
}

function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

class Workshop {
    constructor() {
        this.buttons = [];
    }

    /**
     * Draw the full workshop screen.
     * @param {CanvasRenderingContext2D} ctx
     * @param {object} saveData

        ctx.textBaseline = 'top';

        const leftX = 50;
        const leftW = 420;
        let leftY = 95;

        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = '14px Arial, sans-serif';
        ctx.fillText('GLOBAL UPGRADES', leftX, leftY);
        leftY += 22;

            const affordable = !maxed && saveData.essence >= cost;

                ctx.fillStyle = 'rgb(30, 50, 30)';
            } else if (affordable) {
                ctx.fillStyle = Colors.BG_LIGHT;

            ctx.fill();

            // Name
            ctx.fillStyle = Colors.TEXT;
            ctx.font = '17px Arial, sans-serif';
            ctx.fillText(upg.name, leftX + 10, leftY + 5);

            // Description
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.font = '14px Arial, sans-serif';
            ctx.fillText(upg.desc, leftX + 10, leftY + 24);

            // Level pips on the right
            this._drawPips(ctx, leftX + leftW - 110, leftY + 10, level, upg.max);

            // Cost or MAX
            ctx.textAlign = 'right';
            if (maxed) {
                ctx.fillStyle = Colors.SUCCESS;
                ctx.font = '14px Arial, sans-serif';
                ctx.fillText('MAX', leftX + leftW - 10, leftY + 14);
            } else {
                ctx.fillStyle = affordable ? '#9933ff' : Colors.TEXT_DARK;
                ctx.font = '14px Arial, sans-serif';
                ctx.fillText(`${cost}`, leftX + leftW - 10, leftY + 14);
            }
            ctx.textAlign = 'left';

            // Store button
            this.buttons.push({ x: leftX, y: leftY, w: leftW, h: 42, category: 'upgrade', key });
            leftY += 45;
        }

        // ── Right column: Tower Unlocks ──
        const rightX = 500;

        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = '14px Arial, sans-serif';
        ctx.fillText('TOWER UNLOCKS', rightX, rightY);
        rightY += 22;

        for (const [key, unlock] of Object.entries(TOWER_UNLOCKS)) {
            const unlocked = saveData.unlocks[key] || false;
            const affordable = !unlocked && saveData.essence >= unlock.cost;

            // Button background
            if (unlocked) {
                ctx.fillStyle = 'rgb(30, 50, 30)';
            } else if (affordable) {
                ctx.fillStyle = Colors.BG_LIGHT;
            } else {
                ctx.fillStyle = 'rgb(25, 25, 40)';
            }
            roundRect(ctx, rightX, rightY, rightW, 42, 4);
            ctx.fill();

            // Name
            ctx.fillStyle = Colors.TEXT;
            ctx.font = '17px Arial, sans-serif';
            ctx.fillText(unlock.name, rightX + 10, rightY + 5);

            // Description
            ctx.fillStyle = Colors.TEXT_DIM;
            ctx.font = '14px Arial, sans-serif';
            ctx.fillText(unlock.desc, rightX + 10, rightY + 24);

            // Status
            ctx.textAlign = 'right';
            if (unlocked) {
                ctx.fillStyle = Colors.SUCCESS;
                ctx.font = '14px Arial, sans-serif';
                ctx.fillText('UNLOCKED', rightX + rightW - 10, rightY + 14);
            } else {
                ctx.fillStyle = affordable ? '#9933ff' : Colors.TEXT_DARK;
                ctx.font = '14px Arial, sans-serif';

    /**
     * Handle a click on the workshop screen.
     * @param {number} mx
     * @param {number} my
     * @param {object} saveData
     * @returns {string|null} 'back', 'purchased', or null
     */
    handleClick(mx, my, saveData) {
        for (const btn of this.buttons) {
            if (mx < btn.x || mx > btn.x + btn.w || my < btn.y || my > btn.y + btn.h) {
                continue;
            }

            if (btn.category === 'back') {
                return 'back';
            }

            if (btn.category === 'upgrade') {
                const upg = WORKSHOP_UPGRADES[btn.key];
                const level = saveData.upgrades[btn.key] || 0;
                if (level < upg.max && saveData.essence >= upg.costs[level]) {
                    saveData.essence -= upg.costs[level];
                    saveData.upgrades[btn.key] = level + 1;
                    saveSaveData(saveData);
                    return 'purchased';
                }
            }

            if (btn.category === 'unlock') {
                const unlock = TOWER_UNLOCKS[btn.key];
                const already = saveData.unlocks[btn.key] || false;
                if (!already && saveData.essence >= unlock.cost) {
                    saveData.essence -= unlock.cost;
                    saveData.unlocks[btn.key] = true;
                    saveSaveData(saveData);
                    return 'purchased';
                }
            }

            if (btn.category === 'mastery') {
                const mast = TOWER_MASTERY[btn.key];
                const level = saveData.mastery[btn.key] || 0;
                if (level < mast.max && saveData.essence >= mast.costs[level]) {
                    saveData.essence -= mast.costs[level];
                    saveData.mastery[btn.key] = level + 1;
                    saveSaveData(saveData);
                    return 'purchased';
                }
            }
        }

        return null;
    }

    /**
     * Draw small square pips showing level progress.
     * @param {CanvasRenderingContext2D} ctx
     * @param {number} x - Starting x position
     * @param {number} y - Starting y position
     * @param {number} level - Current level
     * @param {number} max - Maximum level
     */
    _drawPips(ctx, x, y, level, max) {
        const pipSize = 6;
        const pipGap = 4;
        for (let i = 0; i < max; i++) {
            const px = x + i * (pipSize + pipGap);
            if (i < level) {
                // Filled pip
                ctx.fillStyle = Colors.SUCCESS;
                ctx.fillRect(px, y, pipSize, pipSize);
            } else {
                // Empty pip (border only)
                ctx.strokeStyle = Colors.TEXT_DIM;
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 0.5, y + 0.5, pipSize - 1, pipSize - 1);
            }
        }
    }
}

// roundRect helper for drawing rounded-corner rectangles
function roundRect(ctx, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
}

class MapEditor {
    constructor() {
        // 20 rows x 30 columns grid, initialized to GRASS
        this.tiles = [];
        for (let row = 0; row < GRID_HEIGHT; row++) {
            this.tiles.push(new Array(GRID_WIDTH).fill(TileType.GRASS));
        }

        this.mapName = 'Untitled';
        this.selectedTile = TileType.PATH;
        this.painting = false;
        this.erasing = false;

        this.undoStack = [];
        this.statusMsg = '';
        this.statusTimer = 0;
        this.validationResult = null;

        // Tile palette
        this.palette = [
            TileType.GRASS, TileType.PATH, TileType.WATER, TileType.TREE,
            TileType.ROCK, TileType.SPAWN, TileType.EXIT, TileType.HIGH_GROUND
        ];
        this.paletteNames = [
            'Grass', 'Path', 'Water', 'Tree',
            'Rock', 'Spawn', 'Exit', 'High Ground'
        ];

        // Panel layout
        const panelX = SCREEN_WIDTH - PANEL_WIDTH;
        const palStartY = GRID_OFFSET_Y + 10;
        const btnW = 260;
        const palBtnH = 34;
        const palSpacing = 38;

        // Build palette buttons
        this.paletteButtons = [];
        for (let i = 0; i < this.palette.length; i++) {
            this.paletteButtons.push({
                x: panelX + 10,
                y: palStartY + i * palSpacing,
                w: btnW,
                h: palBtnH,
                tileType: this.palette[i],
                label: this.paletteNames[i],
            });
        }

        // Tool buttons below palette
        const toolStartY = palStartY + this.palette.length * palSpacing + 20;
        const toolBtnH = 30;
        const toolSpacing = 35;
        const toolLabels = ['Validate (V)', 'Clear (C)', 'Generate (G)', 'Save', 'Load'];
        const toolActions = ['validate', 'clear', 'generate', 'save', 'load'];

        this.toolButtons = [];
        for (let i = 0; i < toolLabels.length; i++) {
            this.toolButtons.push({
                x: panelX + 10,
                y: toolStartY + i * toolSpacing,
                w: btnW,
                h: toolBtnH,
                label: toolLabels[i],
                action: toolActions[i],
            });
        }

        // Back button (bottom-right)
        this.backButton = {
            x: SCREEN_WIDTH - 130,
            y: SCREEN_HEIGHT - 35,
            w: 120,
            h: 30,
        };
    }

    update(dt) {
        if (this.statusTimer > 0) {
            this.statusTimer -= dt;
            if (this.statusTimer <= 0) {
                this.statusMsg = '';
                this.statusTimer = 0;
            }
        }
    }

    draw(ctx, mouseX, mouseY) {
        // --- Top bar ---
        ctx.fillStyle = Colors.BG;
        ctx.fillRect(0, 0, SCREEN_WIDTH, TOP_BAR_HEIGHT);
        // Title
        ctx.fillStyle = Colors.ACCENT;
        ctx.font = 'bold 20px Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(`MAP EDITOR - ${this.mapName}`, 16, TOP_BAR_HEIGHT / 2);
        // Grid size right-aligned
        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = '14px Arial, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`${GRID_WIDTH} x ${GRID_HEIGHT}`, SCREEN_WIDTH - PANEL_WIDTH - 16, TOP_BAR_HEIGHT / 2);
        ctx.textAlign = 'left';

        // --- Grid ---
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                const tileType = this.tiles[row][col];
                const px = GRID_OFFSET_X + col * TILE_SIZE;
                const py = GRID_OFFSET_Y + row * TILE_SIZE;
                const sprite = getTileSprite(tileType, col, row);
                ctx.drawImage(sprite, px, py);
            }
        }

        // Faint grid lines
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.lineWidth = 1;
        for (let col = 0; col <= GRID_WIDTH; col++) {
            const x = GRID_OFFSET_X + col * TILE_SIZE;
            ctx.beginPath();
            ctx.moveTo(x, GRID_OFFSET_Y);
            ctx.lineTo(x, GRID_OFFSET_Y + GRID_HEIGHT * TILE_SIZE);
            ctx.stroke();
        }
        for (let row = 0; row <= GRID_HEIGHT; row++) {
            const y = GRID_OFFSET_Y + row * TILE_SIZE;
            ctx.beginPath();
            ctx.moveTo(GRID_OFFSET_X, y);
            ctx.lineTo(GRID_OFFSET_X + GRID_WIDTH * TILE_SIZE, y);
            ctx.stroke();
        }

        // Highlight hovered tile
        const hovered = this._screenToGrid(mouseX, mouseY);
        if (hovered) {
            const hx = GRID_OFFSET_X + hovered.gx * TILE_SIZE;
            const hy = GRID_OFFSET_Y + hovered.gy * TILE_SIZE;
            ctx.strokeStyle = Colors.ACCENT;
            ctx.lineWidth = 2;
            ctx.strokeRect(hx, hy, TILE_SIZE, TILE_SIZE);
        }

        // Validation overlay
        if (this.validationResult) {
            for (let row = 0; row < GRID_HEIGHT; row++) {
                for (let col = 0; col < GRID_WIDTH; col++) {
                    const tileType = this.tiles[row][col];
                    if (tileType === TileType.PATH || tileType === TileType.SPAWN || tileType === TileType.EXIT) {
                        const px = GRID_OFFSET_X + col * TILE_SIZE;
                        const py = GRID_OFFSET_Y + row * TILE_SIZE;
                        if (this.validationResult.valid) {
                            ctx.fillStyle = 'rgba(68, 255, 68, 0.2)';
                        } else {
                            ctx.fillStyle = 'rgba(255, 68, 68, 0.2)';
                        }
                        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        // --- Right panel ---
        const panelX = SCREEN_WIDTH - PANEL_WIDTH;
        ctx.fillStyle = Colors.PANEL;
        ctx.fillRect(panelX, 0, PANEL_WIDTH, SCREEN_HEIGHT);
        // Panel border
        ctx.strokeStyle = Colors.PANEL_BORDER;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(panelX, 0);
        ctx.lineTo(panelX, SCREEN_HEIGHT);
        ctx.stroke();

        // Panel title
        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = 'bold 14px Arial, sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('TILES', panelX + 10, GRID_OFFSET_Y - 4);

        // Palette buttons
        for (const btn of this.paletteButtons) {
            const isSelected = btn.tileType === this.selectedTile;
            // Button background
            if (isSelected) {
                ctx.fillStyle = Colors.ACCENT;
            } else {
                ctx.fillStyle = Colors.BG_LIGHT;
            }
            roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
            ctx.fill();

            // Button border on hover
            if (mouseX >= btn.x && mouseX <= btn.x + btn.w &&
                mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                ctx.strokeStyle = Colors.ACCENT;
                ctx.lineWidth = 1;
                roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
                ctx.stroke();
            }

            // Tile preview swatch
            const swatchSize = 22;
            const swatchX = btn.x + 8;
            const swatchY = btn.y + (btn.h - swatchSize) / 2;
            const sprite = getTileSprite(btn.tileType, 0, 0);
            ctx.drawImage(sprite, swatchX, swatchY, swatchSize, swatchSize);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.strokeRect(swatchX, swatchY, swatchSize, swatchSize);

            // Label
            ctx.fillStyle = isSelected ? Colors.BLACK : Colors.TEXT;
            ctx.font = '13px Arial, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(btn.label, btn.x + 38, btn.y + btn.h / 2);

            // Hotkey hint
            const idx = this.palette.indexOf(btn.tileType);
            if (idx >= 0) {
                ctx.fillStyle = isSelected ? 'rgba(0,0,0,0.5)' : Colors.TEXT_DARK;
                ctx.font = '11px Arial, sans-serif';
                ctx.textAlign = 'right';
                ctx.fillText(`[${idx}]`, btn.x + btn.w - 8, btn.y + btn.h / 2);
            }
        }

        // Tool buttons
        for (const btn of this.toolButtons) {
            ctx.fillStyle = Colors.BG_LIGHT;
            roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
            ctx.fill();

            // Hover highlight
            if (mouseX >= btn.x && mouseX <= btn.x + btn.w &&
                mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                ctx.strokeStyle = Colors.ACCENT;
                ctx.lineWidth = 1;
                roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 4);
                ctx.stroke();
            }

            ctx.fillStyle = Colors.TEXT;
            ctx.font = '13px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2);
        }

        // --- Bottom bar ---
        const bottomY = SCREEN_HEIGHT - BOTTOM_BAR_HEIGHT;
        ctx.fillStyle = Colors.BG;
        ctx.fillRect(0, bottomY, SCREEN_WIDTH, BOTTOM_BAR_HEIGHT);

        // Status message
        if (this.statusMsg) {
            ctx.fillStyle = Colors.ACCENT;
            ctx.font = '13px Arial, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(this.statusMsg, 16, bottomY + BOTTOM_BAR_HEIGHT / 2);
        }

        // Selected tile info
        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = '12px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const selIdx = this.palette.indexOf(this.selectedTile);
        const selName = selIdx >= 0 ? this.paletteNames[selIdx] : '???';
        ctx.fillText(`Selected: ${selName}`, SCREEN_WIDTH / 2, bottomY + BOTTOM_BAR_HEIGHT / 2);

        // Spawn / exit counts
        let spawnCount = 0;
        let exitCount = 0;
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                if (this.tiles[row][col] === TileType.SPAWN) spawnCount++;
                if (this.tiles[row][col] === TileType.EXIT) exitCount++;
            }
        }
        ctx.fillStyle = Colors.TEXT_DIM;
        ctx.font = '12px Arial, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`Spawns: ${spawnCount}  Exits: ${exitCount}`, SCREEN_WIDTH - PANEL_WIDTH - 16, bottomY + BOTTOM_BAR_HEIGHT / 2);

        // --- Back button ---
        const bb = this.backButton;
        ctx.fillStyle = Colors.BG_LIGHT;
        roundRect(ctx, bb.x, bb.y, bb.w, bb.h, 4);
        ctx.fill();
        if (mouseX >= bb.x && mouseX <= bb.x + bb.w &&
            mouseY >= bb.y && mouseY <= bb.y + bb.h) {
            ctx.strokeStyle = Colors.ACCENT;
            ctx.lineWidth = 1;
            roundRect(ctx, bb.x, bb.y, bb.w, bb.h, 4);
            ctx.stroke();
        }
        ctx.fillStyle = Colors.TEXT;
        ctx.font = '13px Arial, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Back (Esc)', bb.x + bb.w / 2, bb.y + bb.h / 2);
    }

    handleMouseDown(mx, my, button) {
        if (button === 0) {
            // Check palette buttons
            for (const btn of this.paletteButtons) {
                if (mx >= btn.x && mx <= btn.x + btn.w &&
                    my >= btn.y && my <= btn.y + btn.h) {
                    this.selectedTile = btn.tileType;
                    return null;
                }
            }

            // Check tool buttons
            for (const btn of this.toolButtons) {
                if (mx >= btn.x && mx <= btn.x + btn.w &&
                    my >= btn.y && my <= btn.y + btn.h) {
                    switch (btn.action) {
                        case 'validate': this._validate(); break;
                        case 'clear': this._clear(); break;
                        case 'generate': this._generateRandom(); break;
                        case 'save': this._saveMap(); break;
                        case 'load': this._loadMap(); break;
                    }
                    return null;
                }
            }

            // Check back button
            const bb = this.backButton;
            if (mx >= bb.x && mx <= bb.x + bb.w &&
                my >= bb.y && my <= bb.y + bb.h) {
                return 'quit';
            }

            // Start painting on grid
            const cell = this._screenToGrid(mx, my);
            if (cell) {
                this._pushUndo();
                this.painting = true;
                this._paintAt(cell.gx, cell.gy);
            }
        } else if (button === 2) {
            // Right-click: start erasing
            const cell = this._screenToGrid(mx, my);
            if (cell) {
                this._pushUndo();
                this.erasing = true;
                this.tiles[cell.gy][cell.gx] = TileType.GRASS;
                this.validationResult = null;
            }
        }
        return null;
    }

    handleMouseMove(mx, my) {
        if (this.painting) {
            const cell = this._screenToGrid(mx, my);
            if (cell) {
                this._paintAt(cell.gx, cell.gy);
            }
        }
        if (this.erasing) {
            const cell = this._screenToGrid(mx, my);
            if (cell) {
                this.tiles[cell.gy][cell.gx] = TileType.GRASS;
                this.validationResult = null;
            }
        }
    }

    handleMouseUp() {
        this.painting = false;
        this.erasing = false;
    }

    handleKeyDown(key, ctrlKey = false) {
        if (key === 'Escape') {
            return 'quit';
        }
        if (key === 'v' || key === 'V') {
            this._validate();
            return null;
        }
        if (key === 'c' || key === 'C') {
            this._clear();
            return null;
        }
        if (key === 'g' || key === 'G') {
            this._generateRandom();
            return null;
        }
        if ((key === 'z' || key === 'Z') && ctrlKey) {
            this._undo();
            return null;
        }
        // Number keys 0-7 to select palette tile
        const num = parseInt(key);
        if (!isNaN(num) && num >= 0 && num <= 7) {
            this.selectedTile = this.palette[num];
            return null;
        }
        return null;
    }

    _screenToGrid(mx, my) {
        const gx = Math.floor((mx - GRID_OFFSET_X) / TILE_SIZE);
        const gy = Math.floor((my - GRID_OFFSET_Y) / TILE_SIZE);
        if (gx < 0 || gx >= GRID_WIDTH || gy < 0 || gy >= GRID_HEIGHT) {
            return null;
        }
        return { gx, gy };
    }

    _pushUndo() {
        const copy = this.tiles.map(row => [...row]);
        this.undoStack.push(copy);
        if (this.undoStack.length > 50) {
            this.undoStack.shift();
        }
    }

    _undo() {
        if (this.undoStack.length === 0) {
            this._setStatus('Nothing to undo');
            return;
        }
        this.tiles = this.undoStack.pop();
        this.validationResult = null;
        this._setStatus('Undo');
    }

    _paintAt(gx, gy) {
        this.tiles[gy][gx] = this.selectedTile;
        this.validationResult = null;
    }

    _setStatus(msg, duration = 3.0) {
        this.statusMsg = msg;
        this.statusTimer = duration;
    }

    _validate() {
        const errors = [];

        // Collect spawns and exits
        const spawns = [];
        const exits = [];
        let buildableCount = 0;
        const totalCells = GRID_WIDTH * GRID_HEIGHT;

        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                const t = this.tiles[row][col];
                if (t === TileType.SPAWN) spawns.push([col, row]);
                if (t === TileType.EXIT) exits.push([col, row]);
                // Buildable: GRASS or HIGH_GROUND
                if (t === TileType.GRASS || t === TileType.HIGH_GROUND) {
                    buildableCount++;
                }
            }
        }

        // Check at least 1 spawn
        if (spawns.length === 0) {
            errors.push('Need at least 1 Spawn tile');
        }
        // Check at least 1 exit
        if (exits.length === 0) {
            errors.push('Need at least 1 Exit tile');
        }

        // Check spawns on left edge (x = 0)
        for (const [sx, sy] of spawns) {
            if (sx !== 0) {
                errors.push(`Spawn at (${sx},${sy}) must be on left edge (x=0)`);
            }
        }
        // Check exits on right edge (x = 29)
        for (const [ex, ey] of exits) {
            if (ex !== GRID_WIDTH - 1) {
                errors.push(`Exit at (${ex},${ey}) must be on right edge (x=${GRID_WIDTH - 1})`);
            }
        }

        // Check path connectivity: each spawn must reach at least one exit
        if (spawns.length > 0 && exits.length > 0) {
            for (const spawn of spawns) {
                const route = findRoute(this.tiles, spawn, exits);
                if (route.length === 0) {
                    errors.push(`Spawn at (${spawn[0]},${spawn[1]}) has no path to any exit`);
                }
            }
        }

        // Check buildable area >= 20%
        const buildableRatio = buildableCount / totalCells;
        if (buildableRatio < 0.2) {
            errors.push(`Buildable area too low: ${(buildableRatio * 100).toFixed(1)}% (need >= 20%)`);
        }

        const valid = errors.length === 0;
        this.validationResult = { valid, errors };

        if (valid) {
            this._setStatus('Map is valid!', 4.0);
        } else {
            this._setStatus(`Invalid: ${errors[0]}${errors.length > 1 ? ` (+${errors.length - 1} more)` : ''}`, 5.0);
        }
    }

    _clear() {
        this._pushUndo();
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                this.tiles[row][col] = TileType.GRASS;
            }
        }
        this.validationResult = null;
        this._setStatus('Cleared');
    }

    _generateRandom() {
        this._pushUndo();

        // Fill with grass
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                this.tiles[row][col] = TileType.GRASS;
            }
        }

        // Place 1-2 spawns on left edge
        const numSpawns = 1 + Math.floor(Math.random() * 2);
        const spawnRows = [];
        for (let i = 0; i < numSpawns; i++) {
            let sy;
            do {
                sy = 2 + Math.floor(Math.random() * (GRID_HEIGHT - 4));
            } while (spawnRows.includes(sy));
            spawnRows.push(sy);
            this.tiles[sy][0] = TileType.SPAWN;
        }

        // Place 1-2 exits on right edge
        const numExits = 1 + Math.floor(Math.random() * 2);
        const exitRows = [];
        for (let i = 0; i < numExits; i++) {
            let ey;
            do {
                ey = 2 + Math.floor(Math.random() * (GRID_HEIGHT - 4));
            } while (exitRows.includes(ey));
            exitRows.push(ey);
            this.tiles[ey][GRID_WIDTH - 1] = TileType.EXIT;
        }

        // Generate snaking paths from each spawn to nearest exit
        for (const sy of spawnRows) {
            // Find the closest exit row
            let targetRow = exitRows[0];
            let minDist = Math.abs(sy - exitRows[0]);
            for (const ey of exitRows) {
                const dist = Math.abs(sy - ey);
                if (dist < minDist) {
                    minDist = dist;
                    targetRow = ey;
                }
            }

            // Walk from spawn toward exit with horizontal and vertical segments
            let cx = 1;  // start after spawn
            let cy = sy;
            const targetX = GRID_WIDTH - 2; // stop before exit

            while (cx <= targetX) {
                // Horizontal segment (3-8 tiles long)
                const hLen = 3 + Math.floor(Math.random() * 6);
                for (let i = 0; i < hLen && cx <= targetX; i++) {
                    this.tiles[cy][cx] = TileType.PATH;
                    cx++;
                }

                if (cx > targetX) break;

                // Vertical jog toward target row
                const diff = targetRow - cy;
                if (diff !== 0) {
                    const vLen = Math.min(Math.abs(diff), 2 + Math.floor(Math.random() * 4));
                    const dir = diff > 0 ? 1 : -1;
                    for (let i = 0; i < vLen; i++) {
                        cy += dir;
                        cy = Math.max(1, Math.min(GRID_HEIGHT - 2, cy));
                        this.tiles[cy][cx] = TileType.PATH;
                    }
                } else {
                    // Random vertical jog for variety
                    const jog = (Math.random() < 0.5 ? 1 : -1) * (1 + Math.floor(Math.random() * 3));
                    const steps = Math.abs(jog);
                    const dir = jog > 0 ? 1 : -1;
                    for (let i = 0; i < steps; i++) {
                        cy += dir;
                        cy = Math.max(1, Math.min(GRID_HEIGHT - 2, cy));
                        this.tiles[cy][cx] = TileType.PATH;
                    }
                }
            }

            // Connect last path tile to exit
            const exitX = GRID_WIDTH - 1;
            // Ensure there's a path tile adjacent to the exit
            if (this.tiles[targetRow][exitX - 1] !== TileType.PATH) {
                // Connect vertically from cy to targetRow at cx-1
                let connectX = Math.min(cx, GRID_WIDTH - 2);
                const startY = cy;
                const endY = targetRow;
                const dir = endY > startY ? 1 : -1;
                let yy = startY;
                while (yy !== endY) {
                    yy += dir;
                    this.tiles[yy][connectX] = TileType.PATH;
                }
                // Then horizontal to exit
                for (let xx = connectX + 1; xx < exitX; xx++) {
                    this.tiles[targetRow][xx] = TileType.PATH;
                }
            }
        }

        // Add decorations near the path
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                if (this.tiles[row][col] !== TileType.GRASS) continue;

                // Check if near a path
                let nearPath = false;
                for (let dy = -2; dy <= 2; dy++) {
                    for (let dx = -2; dx <= 2; dx++) {
                        const nr = row + dy;
                        const nc = col + dx;
                        if (nr >= 0 && nr < GRID_HEIGHT && nc >= 0 && nc < GRID_WIDTH) {
                            const t = this.tiles[nr][nc];
                            if (t === TileType.PATH || t === TileType.SPAWN || t === TileType.EXIT) {
                                nearPath = true;
                                break;
                            }
                        }
                    }
                    if (nearPath) break;
                }

                const rand = Math.random();
                if (nearPath) {
                    // Near path: occasional trees/rocks
                    if (rand < 0.06) {
                        this.tiles[row][col] = TileType.TREE;
                    } else if (rand < 0.10) {
                        this.tiles[row][col] = TileType.ROCK;
                    } else if (rand < 0.12) {
                        this.tiles[row][col] = TileType.HIGH_GROUND;
                    }
                } else {
                    // Far from path: more decorations
                    if (rand < 0.08) {
                        this.tiles[row][col] = TileType.TREE;
                    } else if (rand < 0.12) {
                        this.tiles[row][col] = TileType.ROCK;
                    } else if (rand < 0.15) {
                        this.tiles[row][col] = TileType.WATER;
                    } else if (rand < 0.17) {
                        this.tiles[row][col] = TileType.HIGH_GROUND;
                    }
                }
            }
        }

        this.validationResult = null;
        this._setStatus('Generated random map');
    }

    _saveMap() {
        // Collect spawns and exits
        const spawns = [];
        const exits = [];
        for (let row = 0; row < GRID_HEIGHT; row++) {
            for (let col = 0; col < GRID_WIDTH; col++) {
                if (this.tiles[row][col] === TileType.SPAWN) spawns.push([col, row]);
                if (this.tiles[row][col] === TileType.EXIT) exits.push([col, row]);
            }
        }

        const mapData = {
            name: this.mapName,
            width: GRID_WIDTH,
            height: GRID_HEIGHT,
            tiles: this.tiles.map(row => [...row]),
            spawns,
            exits,
        };

        try {
            const key = `custom_map_${this.mapName}`;
            localStorage.setItem(key, JSON.stringify(mapData));
            this._setStatus('Saved!');
        } catch (e) {
            this._setStatus(`Save failed: ${e.message}`, 4.0);
        }
    }

    _loadMap() {
        // Scan localStorage for custom maps
        let foundKey = null;
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('custom_map_')) {
                foundKey = key;
                break;
            }
        }

        if (!foundKey) {
            this._setStatus('No saved maps found');
            return;
        }

        try {
            const data = JSON.parse(localStorage.getItem(foundKey));
            if (!data || !data.tiles) {
                this._setStatus('Invalid map data');
                return;
            }

            this._pushUndo();
            this.mapName = data.name || 'Untitled';

            // Restore tiles
            for (let row = 0; row < GRID_HEIGHT; row++) {
                for (let col = 0; col < GRID_WIDTH; col++) {
                    if (data.tiles[row] && data.tiles[row][col] !== undefined) {
                        this.tiles[row][col] = data.tiles[row][col];
                    } else {
                        this.tiles[row][col] = TileType.GRASS;
                    }
                }
            }

            this.validationResult = null;
            this._setStatus(`Loaded ${this.mapName}`);
        } catch (e) {
            this._setStatus(`Load failed: ${e.message}`, 4.0);
        }
    }
}
